          const isFirst = idx === 0;
          const marker = L.marker(pt, {
            draggable: true,
            zIndexOffset: 500,
            icon: L.divIcon({
              className: '',
              html: `<div style="width:${isFirst?14:10}px;height:${isFirst?14:10}px;background:${isFirst?'#f59e0b':'#3b82f6'};border:2px solid white;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,0.4);transform:translate(-${isFirst?7:5}px,-${isFirst?7:5}px);cursor:grab"></div>`,
              iconSize: [0, 0]
            })
          }).addTo(map);

          marker.on('drag', (ev) => {
            const ll = ev.target.getLatLng();
            polygonEditVertices[idx] = [parseFloat(ll.lat.toFixed(6)), parseFloat(ll.lng.toFixed(6))];
            if (polygonPreviewLayer) polygonPreviewLayer.setLatLngs(polygonEditVertices);
            else if (polygonEditVertices.length >= 2) {
              polygonPreviewLayer = L.polygon(polygonEditVertices, { color: '#3b82f6', weight: 2, fillOpacity: 0.1, dashArray: '6,4' }).addTo(map);
            }
          });

          marker.on('dragend', () => updatePolyBar());

          marker.on('contextmenu', (ev) => {
            L.DomEvent.stop(ev);
            if (polygonEditVertices.length <= 3) { alert('至少需要 3 個頂點'); return; }
            polygonEditVertices.splice(idx, 1);
            renderPolygonEdit();
            updatePolyBar();
          });

          polygonEditMarkers.push(marker);
        });
      }

      function startPolygonEdit(buildingId) {
        editingBuildingId = buildingId;
        polygonEditVertices = [];
        if (buildingId) {
          const b = buildings.find(b => b.id === buildingId);
          if (b && b.bounds && b.bounds.length >= 3) {
            polygonEditVertices = b.bounds.map(p => [...p]);
          }
        }
        window._pendingBounds = null;
        clearPolygonEditUI();
        polygonEditActive = true;
        document.getElementById('building-manager-overlay').classList.remove('active');
        renderPolygonEdit();
        updatePolyBar();
      }

      function confirmPolygonEdit() {
        if (polygonEditVertices.length < 3) { alert('至少需要 3 個頂點'); return; }
        const bounds = polygonEditVertices.map(p => [...p]);
        clearPolygonEditUI();
        polygonEditActive = false;
        document.getElementById('poly-bar').classList.remove('show');
        document.getElementById('hint').style.opacity = '0';
        if (editingBuildingId) {
          const b = buildings.find(b => b.id === editingBuildingId);
          if (b) b.bounds = bounds;
          editingBuildingId = null;
          autoAssignBuildingToNodes();
          renderBuildingsOnMap();
        } else {
          window._pendingBounds = bounds;
          document.getElementById('bm-bounds-label').textContent = `已選：${bounds.length} 個頂點`;
        }
        openBuildingManager();
      }

      function cancelPolygonEdit() {
        clearPolygonEditUI();
        polygonEditActive = false;
        editingBuildingId = null;
        document.getElementById('poly-bar').classList.remove('show');
        document.getElementById('hint').style.opacity = '0';
        openBuildingManager();
      }

      // === Path System ===

      // Render all path polylines on the map
      function renderPaths() {
        pathLayers.forEach(l => map.removeLayer(l));
        pathLayers = [];
        // 繪製新路徑或編輯路徑時，仍保留其他路徑的顯示

        paths.forEach(p => {
          // 正在編輯的路徑由 renderPathEditMode 自行繪製，跳過
          if (pathEditMode && p.id === selectedPathId) return;
          (p.segments || []).forEach(seg => {
            const p0 = p.points[seg[0]];
            const p1 = p.points[seg[1]];
            if (!p0 || !p1) return;
            const isSelected = p.id === selectedPathId;
            const color = isSelected ? '#f59e0b' : (p.isOutdoor ? '#10b981' : '#64748b'); // Green for outdoor
            const dashArray = p.isOutdoor ? '10, 10' : null;
            const line = L.polyline([p0, p1], {
              color: color,
              weight: 15,
              opacity: isSelected ? 0.9 : 0.5,
              dashArray: dashArray,
            }).addTo(map);
            line.on('click', function(ev) {
              L.DomEvent.stopPropagation(ev);
              selectPath(p.id);
            });
            pathLayers.push(line);
          });
        });
      }

      // Select a path and show edit panel
      function selectPath(id) {
        selectedNodeId = null;
        selectedPathId = id;
        const path = paths.find(p => p.id === id);
        if (!path) return;

        const panel = document.getElementById('edit-panel');
        panel.classList.add('show');
        // Switch to path panel
        document.getElementById('edit-panel-content').style.display = 'none';
        document.getElementById('path-edit-content').style.display = 'block';
        document.getElementById('edit-panel-title').innerHTML = '<i class="fa-solid fa-route text-amber-500 mr-2"></i>編輯路徑';
        const useRealFloors = path.isOutdoor || path.pathType === 'ramp';
        const allFloors = [...new Set(nodes.flatMap(n => useRealFloors ? getNodeRealFloors(n) : getNodeDisplayFloors(n)))].sort((a, b) => a - b);
        const pathFloors = getPathDisplayFloors(path);
        const floorsHTML = allFloors.map(f => {
          const checked = pathFloors.includes(f) ? 'checked' : '';
          return `<label class="flex items-center gap-1.5 cursor-pointer select-none">
            <input type="checkbox" value="${f}" ${checked} onchange="togglePathFloor(${f})" class="accent-amber-500 w-3.5 h-3.5">
            <span class="text-sm text-gray-700 font-medium">${f}F</span>
          </label>`;
        }).join('');

        document.getElementById('path-edit-content').innerHTML = `
          <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm space-y-4">
            <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">路徑資訊</h3>
            <div>
              <label class="text-xs text-gray-500 mb-1 block">路徑 ID</label>
              <input readonly class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm text-gray-500 font-mono" value="${path.id}" />
            </div>
            <div>
              <label class="text-xs text-gray-600 mb-1 block">所屬建築</label>
              <select onchange="updatePathBuilding(this.value)" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                <option value="">— 未分配 —</option>
                ${buildings.map(b => `<option value="${b.id}" ${b.id === path.building ? 'selected' : ''}>${b.name}</option>`).join('')}
              </select>
            </div>
            <div>
              <label class="text-xs text-gray-600 mb-1 block">路徑型態</label>
              <select onchange="updatePathType(this.value)" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                <option value="walk" ${!path.pathType || path.pathType === 'walk' ? 'selected' : ''}>一般路徑</option>
                <option value="ramp" ${path.pathType === 'ramp' ? 'selected' : ''}>斜坡</option>
              </select>
            </div>
          </div>

          <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm space-y-3">
            <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">${useRealFloors ? '真實樓層' : '建築樓層'}</h3>
            <p class="text-[11px] text-gray-400">${useRealFloors ? '室外或斜坡路徑使用真實樓層。' : '室內路徑使用建築樓層；未勾選時套用到建築內所有可用樓層。'}</p>
            <div id="path-floor-checkboxes" class="flex flex-wrap gap-3">
              ${allFloors.length > 0 ? floorsHTML : '<span class="text-xs text-gray-400">尚無可用樓層</span>'}
            </div>
            <div class="text-xs text-gray-500 mt-1">
              <i class="fa-solid fa-circle-info mr-1"></i>
              目前：${pathFloors.length > 0 ? pathFloors.join(', ') + 'F' : '所有樓層（預設）'}
            </div>
          </div>

          <!-- 室外屬性 Toggle -->
          <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm space-y-4">
            <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">進階屬性</h3>
            <label class="flex items-center justify-between cursor-pointer group">
              <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-full bg-blue-50 flex items-center justify-center text-blue-600"><i class="fa-solid fa-cloud-sun"></i></div>
                <div>
                  <div class="text-sm font-medium text-gray-700">設為室外路徑</div>
                  <div class="text-[11px] text-gray-400">不受限於特定建築內部</div>
                </div>
              </div>
              <div class="relative inline-block w-10 h-5">
                <input type="checkbox" class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-4 appearance-none cursor-pointer m-0" onchange="togglePathOutdoor(this.checked)" ${path.isOutdoor ? 'checked' : ''}/>
                <label class="toggle-label block overflow-hidden cursor-pointer"></label>
              </div>
            </label>
          </div>

          <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm">
            <div class="text-xs text-gray-500">
              <i class="fa-solid fa-circle-info mr-1"></i>
              ${path.points.length} 個頂點，${(path.segments||[]).length} 條線段
            </div>
          </div>

          <div class="pt-2">
            <button onclick="enterPathEditMode()" class="w-full py-3 bg-amber-50 border-2 border-amber-200 text-amber-700 rounded-xl text-sm font-medium hover:bg-amber-100 hover:border-amber-300 transition-colors flex items-center justify-center gap-2">
              <i class="fa-solid fa-pen"></i> 編輯路徑形狀
            </button>
          </div>
          <div class="pt-4 border-t border-gray-100">
            <button onclick="deletePath()" class="w-full py-3 bg-white border-2 border-red-100 text-red-600 rounded-xl text-sm font-medium hover:bg-red-50 hover:border-red-200 transition-colors flex items-center justify-center gap-2">
              <i class="fa-solid fa-trash-can"></i> 刪除此路徑
            </button>
          </div>
        `;

        // Center map on path
        if (path.points.length > 0) {
          const bounds = L.latLngBounds(path.points);
          map.fitBounds(bounds, { padding: [50, 50], maxZoom: map.getZoom() });
        }
        renderAll();
      }

      function updatePathBuilding(value) {
        const path = paths.find(p => p.id === selectedPathId);
        if (!path) return;
        if (value) path.building = value; else delete path.building;
        selectPath(selectedPathId); // refresh panel
      }

      function updatePathType(value) {
        const path = paths.find(p => p.id === selectedPathId);
        if (!path) return;
        if (value && value !== 'walk') path.pathType = value;
        else delete path.pathType;
        if (value === 'ramp') {
          path.isOutdoor = true;
          if (!path.realFloors && path.points.length >= 2) path.realFloors = [1, 2];
          delete path.buildingFloors;
        }
        selectPath(selectedPathId);
      }

      function togglePathFloor(floor) {
        const path = paths.find(p => p.id === selectedPathId);
        if (!path) return;
        const currentFloors = getPathDisplayFloors(path);
        const idx = currentFloors.indexOf(floor);
        if (idx >= 0) {
          currentFloors.splice(idx, 1);
        } else {
          currentFloors.push(floor);
          currentFloors.sort((a, b) => a - b);
        }
        setPathDisplayFloors(path, currentFloors);
        selectPath(selectedPathId); // refresh panel
      }

      function togglePathOutdoor(isOutdoor) {
        const path = paths.find(p => p.id === selectedPathId);
        if (!path) return;
        if (isOutdoor) {
          path.isOutdoor = true;
          if (!path.realFloors && getPathDisplayFloors(path).length) {
            path.realFloors = [...getPathDisplayFloors(path)];
          }
          delete path.buildingFloors;
        } else {
          delete path.isOutdoor;
          if (!path.pathType || path.pathType === 'walk') {
            if (!path.buildingFloors && getPathDisplayFloors(path).length) {
              path.buildingFloors = [...getPathDisplayFloors(path)];
            }
            delete path.realFloors;
          }
        }
        selectPath(selectedPathId);
      }

      function deletePath() {
        if (!selectedPathId) return;
        if (!confirm('確定要刪除此路徑嗎？')) return;
        paths = paths.filter(p => p.id !== selectedPathId);
        selectedPathId = null;
        document.getElementById('edit-panel').classList.remove('show');
        renderAll();
      }

      // === Path Drawing (new path creation) ===

      function startDrawPath() {
        if (drawingPath) { cancelDrawPath(); return; }
        drawingPath = true;
        drawingPathPoints = [];
        closeEditPanel();
        const btn = document.getElementById('draw-path-btn');
        btn.innerHTML = '<i class="fa-solid fa-check mr-1"></i>完成';
        btn.className = 'text-sm bg-green-600 text-white px-3.5 py-1.5 rounded-lg hover:bg-green-700 transition-colors shadow-sm font-medium whitespace-nowrap';
        const hint = document.getElementById('hint');
        hint.textContent = '點擊地圖描繪路徑，至少需要 2 個點';
        hint.style.opacity = '1';
        const bar = document.getElementById('path-bar');
        document.getElementById('path-bar-text').textContent = '點擊地圖新增路徑點（至少2個）';
        bar.querySelector('.btn-confirm').style.display = 'none';
        bar.classList.add('show');
      }

      function renderDrawingPreview() {
        if (drawingPreviewLine) { map.removeLayer(drawingPreviewLine); drawingPreviewLine = null; }
        if (drawingPathPoints.length >= 2) {
          drawingPreviewLine = L.polyline(drawingPathPoints, {
            color: '#f59e0b', weight: 15, opacity: 0.8,
          }).addTo(map);
        }
        // Update path bar
        const n = drawingPathPoints.length;
        const bar = document.getElementById('path-bar');
        const txt = document.getElementById('path-bar-text');
        if (n < 2) {
          txt.textContent = `已新增 ${n} 個點，還需 ${2 - n} 個`;
          bar.querySelector('.btn-confirm').style.display = 'none';
        } else {
          txt.textContent = `${n} 個點 — 繼續點擊新增，或按「完成」結束`;
          bar.querySelector('.btn-confirm').style.display = '';
        }

        // Show markers for each point
        pathEditMarkers.forEach(m => map.removeLayer(m));
        pathEditMarkers = [];
        drawingPathPoints.forEach((pt, idx) => {
          const marker = L.marker(pt, {
            draggable: true,
            zIndexOffset: 500,
            icon: L.divIcon({
              className: '',
              html: `<div style="width:18px;height:18px;background:#f59e0b;border:2px solid white;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,0.4);transform:translate(-9px,-9px);cursor:grab"></div>`,
              iconSize: [0, 0]
            })
          }).addTo(map);
          marker.on('drag', (ev) => {
            const ll = ev.target.getLatLng();
            drawingPathPoints[idx] = [parseFloat(ll.lat.toFixed(6)), parseFloat(ll.lng.toFixed(6))];
            if (drawingPreviewLine) drawingPreviewLine.setLatLngs(drawingPathPoints);
          });
          pathEditMarkers.push(marker);
        });
      }

      function finishDrawPath() {
        if (drawingPathPoints.length < 2) { alert('至少需要 2 個點'); return; }
        const points = drawingPathPoints.map(p => [...p]);
        const segments = [];
        for (let i = 0; i < points.length - 1; i++) segments.push([i, i + 1]);

        const id = 'path_' + Date.now();
        const building = getNodeBuilding(points[0]) || undefined;
        const newPath = { id, points, segments };
        if (building) newPath.building = building;
        paths.push(newPath);

        cleanUpDrawing();
        selectPath(id);
      }

      function cancelDrawPath() {
        cleanUpDrawing();
        renderAll();
      }

      function cleanUpDrawing() {
        drawingPath = false;
        drawingPathPoints = [];
        if (drawingPreviewLine) { map.removeLayer(drawingPreviewLine); drawingPreviewLine = null; }
        pathEditMarkers.forEach(m => map.removeLayer(m));
        pathEditMarkers = [];
        document.getElementById('path-bar').classList.remove('show');
        document.getElementById('hint').style.opacity = '0';
        const btn = document.getElementById('draw-path-btn');
        btn.innerHTML = '<i class="fa-solid fa-route mr-1"></i>路徑';
        btn.className = 'text-sm bg-amber-600 text-white px-3.5 py-1.5 rounded-lg hover:bg-amber-700 transition-colors shadow-sm font-medium whitespace-nowrap';
      }

      // === Path Edit Mode (edit existing path vertices/segments) ===

      function enterPathEditMode() {
        const path = paths.find(p => p.id === selectedPathId);
        if (!path) return;
        pathEditMode = true;
        document.getElementById('edit-panel').classList.remove('show');

        // Show edit bar
        const bar = document.getElementById('path-bar');
        document.getElementById('path-bar-text').textContent = '拖曳頂點調整形狀｜懸停線段新增頂點｜右鍵刪除頂點';
        bar.querySelector('.btn-confirm').style.display = '';
        bar.querySelector('.btn-confirm').onclick = exitPathEditMode;
        bar.querySelector('.btn-cancel').onclick = cancelPathEditMode;
        bar.classList.add('show');
        document.getElementById('hint').textContent = '路徑編輯中…';
        document.getElementById('hint').style.opacity = '1';

        renderPathEditMode();
      }

      function renderPathEditMode() {
        const path = paths.find(p => p.id === selectedPathId);
        if (!path) return;

        // 清除編輯模式專用圖層（不影響其他路徑）
        editModeLayers.forEach(l => map.removeLayer(l));
        editModeLayers = [];
        pathEditMarkers.forEach(m => map.removeLayer(m));
        pathEditMarkers = [];
        if (ghostMarker) { map.removeLayer(ghostMarker); ghostMarker = null; }

        // 確保其他路徑仍然可見
        renderPaths();

        // Draw segments as interactive polylines
        (path.segments || []).forEach((seg, segIdx) => {
          const p0 = path.points[seg[0]];
          const p1 = path.points[seg[1]];
          if (!p0 || !p1) return;
          const line = L.polyline([p0, p1], {
            color: '#f59e0b', weight: 15, opacity: 0.7,
          }).addTo(map);

          // Ghost vertex: 懸停線段時顯示可插入頂點的預覽圓點
          // 關鍵：ghost marker 設為 interactive: false，避免攔截 mouse 事件造成閃爍
          line.on('mousemove', function(ev) {
            const proj = projectPointToSegment(
              ev.latlng.lat, ev.latlng.lng,
              p0[0], p0[1], p1[0], p1[1]
            );
            if (ghostMarker) map.removeLayer(ghostMarker);
            ghostMarker = L.marker([proj.x, proj.y], {
              icon: L.divIcon({ className: '', html: '<div class="path-ghost-vertex"></div>', iconSize: [0, 0] }),
              zIndexOffset: 600, interactive: false  // 不攔截 mouse 事件
            }).addTo(map);
          });

          // 點擊線段 → 在投影位置插入新頂點
          line.on('click', function(ev) {
            L.DomEvent.stopPropagation(ev);
            const proj = projectPointToSegment(
              ev.latlng.lat, ev.latlng.lng,
              p0[0], p0[1], p1[0], p1[1]
            );
            if (ghostMarker) { map.removeLayer(ghostMarker); ghostMarker = null; }
            insertVertexOnSegment(path, segIdx, [parseFloat(proj.x.toFixed(6)), parseFloat(proj.y.toFixed(6))]);
          });

          line.on('mouseout', function() {
            // 延遲移除 ghost marker，避免快速移動時閃爍
            setTimeout(() => {
              if (ghostMarker) { map.removeLayer(ghostMarker); ghostMarker = null; }
            }, 100);
          });

          editModeLayers.push(line);
        });

        // Draw vertex markers (draggable)
        path.points.forEach((pt, idx) => {
          const degree = (path.segments || []).filter(s => s[0] === idx || s[1] === idx).length;
          const isBranch = degree >= 3;
          const marker = L.marker(pt, {
            draggable: true,
            zIndexOffset: 700,
            icon: L.divIcon({
              className: '',
              html: `<div style="width:${isBranch?22:18}px;height:${isBranch?22:18}px;background:${isBranch?'#ef4444':'#f59e0b'};border:2px solid white;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,0.4);transform:translate(-${isBranch?11:9}px,-${isBranch?11:9}px);cursor:grab"></div>`,
              iconSize: [0, 0]
            })
          }).addTo(map);

          marker.on('drag', (ev) => {
            const ll = ev.target.getLatLng();
            path.points[idx] = [parseFloat(ll.lat.toFixed(6)), parseFloat(ll.lng.toFixed(6))];
            // Update segment lines in real time (使用 editModeLayers 避免清除其他路徑)
            editModeLayers.forEach(l => map.removeLayer(l));
            editModeLayers = [];
            (path.segments || []).forEach(seg => {
              const a = path.points[seg[0]];
              const b = path.points[seg[1]];
              if (!a || !b) return;
              const ln = L.polyline([a, b], { color: '#f59e0b', weight: 15, opacity: 0.7 }).addTo(map);
              editModeLayers.push(ln);
            });
          });

          marker.on('dragend', () => renderPathEditMode());

          // Right-click: delete vertex
          marker.on('contextmenu', (ev) => {
            L.DomEvent.stop(ev);
            deletePathVertex(path, idx);
          });

          // Click: start branch from this vertex
          marker.on('click', (ev) => {
            L.DomEvent.stopPropagation(ev);
            startBranchFrom(path, idx);
          });

          marker.bindTooltip(`頂點 ${idx}${isBranch ? ' (分支點)' : ''} — 點擊拉出分支`, { direction: 'top', offset: [0, -10] });
          pathEditMarkers.push(marker);
        });
      }

      function insertVertexOnSegment(path, segIdx, coord) {
        const seg = path.segments[segIdx];
        const newIdx = path.points.length;
        path.points.push(coord);
        // Replace original segment with two new ones
        path.segments.splice(segIdx, 1, [seg[0], newIdx], [newIdx, seg[1]]);
        renderPathEditMode();
      }

      function deletePathVertex(path, idx) {
        const connectedSegs = path.segments.filter(s => s[0] === idx || s[1] === idx);
        if (path.points.length <= 2) { alert('路徑至少需要 2 個頂點'); return; }

        if (connectedSegs.length === 2) {
          // Reconnect neighbors (bypass this vertex)
          const neighbors = connectedSegs.map(s => s[0] === idx ? s[1] : s[0]);
          path.segments = path.segments.filter(s => s[0] !== idx && s[1] !== idx);
          // Add a new segment connecting the two neighbors (unless they're already connected)
          const alreadyConnected = path.segments.some(s =>
            (s[0] === neighbors[0] && s[1] === neighbors[1]) || (s[0] === neighbors[1] && s[1] === neighbors[0])
          );
          if (!alreadyConnected && neighbors[0] !== neighbors[1]) {
            path.segments.push([neighbors[0], neighbors[1]]);
          }
        } else {
          // Just remove the vertex and all connected segments
          path.segments = path.segments.filter(s => s[0] !== idx && s[1] !== idx);
        }

        // Reindex: remove the point and update all segment indices
        path.points.splice(idx, 1);
        path.segments = path.segments.map(s => [
          s[0] > idx ? s[0] - 1 : s[0],
          s[1] > idx ? s[1] - 1 : s[1]
        ]);

        renderPathEditMode();
      }

      let branchSourceIdx = null;
      function startBranchFrom(path, idx) {
        if (branchSourceIdx === idx) { branchSourceIdx = null; return; } // toggle off
        branchSourceIdx = idx;
        document.getElementById('path-bar-text').textContent = `從頂點 ${idx} 拉出分支 — 點擊地圖放置新頂點`;

        // Temporarily listen for map click to place branch endpoint
        function onBranchClick(ev) {
          map.off('click', onBranchClick);
          if (!pathEditMode) return;
          const latlng = [parseFloat(ev.latlng.lat.toFixed(6)), parseFloat(ev.latlng.lng.toFixed(6))];
          const newIdx = path.points.length;
          path.points.push(latlng);
          path.segments.push([branchSourceIdx, newIdx]);
          branchSourceIdx = null;
          document.getElementById('path-bar-text').textContent = '拖曳頂點調整形狀｜懸停線段新增頂點｜右鍵刪除頂點';
          renderPathEditMode();
        }
        map.once('click', onBranchClick);
      }

      function exitPathEditMode() {
        pathEditMode = false;
        branchSourceIdx = null;
        editModeLayers.forEach(l => map.removeLayer(l));
        editModeLayers = [];
        pathEditMarkers.forEach(m => map.removeLayer(m));
        pathEditMarkers = [];
        if (ghostMarker) { map.removeLayer(ghostMarker); ghostMarker = null; }
        document.getElementById('path-bar').classList.remove('show');
        document.getElementById('hint').style.opacity = '0';
        // Restore confirm handler
        document.querySelector('#path-bar .btn-confirm').onclick = finishDrawPath;
        document.querySelector('#path-bar .btn-cancel').onclick = cancelDrawPath;
        if (selectedPathId) selectPath(selectedPathId);
        else renderAll();
      }

      function cancelPathEditMode() {
        // TODO: could restore original path state, for now just exit
        exitPathEditMode();
      }

      // Project point onto line segment (for ghost vertex)
      function projectPointToSegment(px, py, ax, ay, bx, by) {
        const dx = bx - ax, dy = by - ay;
        const lenSq = dx * dx + dy * dy;
        if (lenSq === 0) return { x: ax, y: ay };
        let t = ((px - ax) * dx + (py - ay) * dy) / lenSq;
        t = Math.max(0, Math.min(1, t));
        return { x: ax + t * dx, y: ay + t * dy };
      }

      // === Keyboard shortcuts ===
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
          if (drawingPath) cancelDrawPath();
          else if (pathEditMode) exitPathEditMode();
        }
      });

      // === File I/O ===
      let fileHandle = null;

      async function saveToFile() {
        const normalized = normalizeDataShape({ buildings, nodes, paths });
        const data = JSON.stringify(normalized, null, 2);

        // Try File System Access API first (Chrome/Edge on localhost/HTTPS)
        if (window.showSaveFilePicker) {
          try {
            if (!fileHandle) {
              fileHandle = await window.showSaveFilePicker({
                suggestedName: 'map_data.json',
                types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }],
              });
            }
            const writable = await fileHandle.createWritable();
            await writable.write(data);
            await writable.close();
            const status = document.getElementById('save-status');
            status.innerHTML = `<i class="fa-solid fa-check mr-1"></i>已儲存 ${new Date().toLocaleTimeString()}`;
            status.classList.remove('opacity-0');
            status.classList.add('opacity-100');
            setTimeout(() => {
              status.classList.remove('opacity-100');
              status.classList.add('opacity-0');
            }, 3000);
            return;
          } catch (err) {
            if (err.name === 'AbortError') return;
            // Fall through to download method
            fileHandle = null;
          }
        }

        // Fallback: download
        const blob = new Blob([data], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'map_data.json';
        a.click();
        URL.revokeObjectURL(a.href);
        const status = document.getElementById('save-status');
        status.innerHTML = `<i class="fa-solid fa-check mr-1"></i>已下載 map_data.json`;
        status.classList.remove('opacity-0');
        status.classList.add('opacity-100');
        setTimeout(() => {
          status.classList.remove('opacity-100');
          status.classList.add('opacity-0');
        }, 3000);
      }


      // === Init: load map_data.json ===
      fetch('map_data.json')
        .then(r => r.json())
        .then(data => {
          const normalized = normalizeDataShape(data);
          buildings = normalized.buildings;
          nodes = normalized.nodes;
          paths = normalized.paths;
          renderBuildingsOnMap();
          renderAll();
          runValidation(false);
        })
        .catch(() => renderAll());
    </script>
  </body>
</html>
