<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>校園導航系統 (Demo v2.0)</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="icon-192.svg" />
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Leaflet CSS & JS (CDN) -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <!-- FontAwesome (CDN) -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              bg: "#F5F3ED", // 暖柔白
              dark: "#4A4A4A", // 炭灰
              slate: "#708191", // 莫蘭迪藍
              sage: "#8FA295", // 莫蘭迪綠
              yellow: "#E6D0A1", // 莫蘭迪黃
              border: "#D8D5CF", // 霧灰
            },
            boxShadow: {
              soft: "0 4px 20px rgba(74, 74, 74, 0.08)",
            },
          },
        },
      };
    </script>
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        font-family: "Inter", sans-serif;
        color: #4a4a4a;
      }

      /* 地圖過濾與樣式 */
      #map {
        height: 100vh;
        width: 100vw;
        z-index: 10;
        background-color: #e8e4db;
      }
      .leaflet-tile-pane {
        filter: grayscale(30%) brightness(102%);
      }

      /* 隱藏預設 Zoom 控件 (Mobile First) */
      .leaflet-control-zoom {
        display: none !important;
      }

      /* Floating UI 共通設定 */
      .overlay {
        z-index: 1000;
        position: absolute;
        pointer-events: none;
      }
      .overlay > * {
        pointer-events: auto;
      }

      /* 頂部搜尋列 */
      #search-bar {
        top: 1rem;
        left: 1rem;
        right: 1rem;
      }

      /* 右側 FABs */
      #right-fabs {
        right: 1rem;
        top: 6rem;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      /* 三段式 Bottom Sheet */
      #bottom-sheet {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 100vh; /* 固定高度，讓 translateY 的百分比基於視窗 */
        background: #f5f3ed;
        border-top-left-radius: 1.5rem;
        border-top-right-radius: 1.5rem;
        box-shadow: 0 -4px 20px rgba(74, 74, 74, 0.1);
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 1001;
          --sheet-fixed-footer-height: 96px;
        transform: translateY(calc(100% - 24px)); /* 預設 closed */
        touch-action: none;
        overflow-y: auto;
      }
      #bottom-sheet {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 100vh; /* 固定高度，讓 translateY 的百分比基於視窗 */
        background: #f5f3ed;
        border-top-left-radius: 1.5rem;
        border-top-right-radius: 1.5rem;
        box-shadow: 0 -4px 20px rgba(74, 74, 74, 0.1);
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 1001;
        --peek-height: 220px;
          --sheet-fixed-footer-height: 96px;
        transform: translateY(calc(100% - 24px)); /* 預設 closed */
        touch-action: none;
        overflow-y: auto;
      }
      #bottom-sheet.dragging {
        transition: none;
      }
      #bottom-sheet.closed {
        transform: translateY(calc(100% - 24px));
      }
      #bottom-sheet.peek {
        transform: translateY(calc(100% - var(--peek-height)));
      }
      #bottom-sheet.full {
        transform: translateY(10%);
      }

      .drag-handle {
        width: 40px;
        height: 5px;
        border-radius: 3px;
        background: #d8d5cf;
        margin: 12px auto;
      }
      .drag-area {
        cursor: grab;
        padding-bottom: 8px; /* 增加可觸控範圍 */
      }
      .drag-area:active {
        cursor: grabbing;
      }

      /* 路線動畫 - 虛線流動 */
      .route-flowing {
        stroke-dasharray: 10;
        animation: dashFlow 0.5s linear infinite;
      }
      .route-flowing.fast {
        animation: dashFlow 0.3s linear infinite;
      }
      @keyframes dashFlow {
        to {
          stroke-dashoffset: -20;
        }
      }

      /* 起點脈衝動畫 */
      @keyframes pulse-ring {
        0% { transform: scale(1); opacity: 0.6; }
        100% { transform: scale(2.5); opacity: 0; }
      }
      .start-pulse {
        position: relative;
      }
      .start-pulse::after {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 2px solid #8FA295;
        animation: pulse-ring 1.5s ease-out infinite;
      }

      /* 標記自訂樣式 */
      .custom-marker {
        background-color: #8fa295;
        border: 2px solid white;
        border-radius: 50%;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
        font-size: 10px;
      }
      .custom-marker.poi {
        background-color: #708191;
      }
      .custom-marker.elevator {
        background-color: #e6d0a1;
        color: #4a4a4a;
      }
      .custom-marker.ground-other-floor {
        opacity: 0.65;
        border-style: dashed;
      }
      .custom-marker.start-marker {
        background-color: #8FA295;
        width: 28px !important;
        height: 28px !important;
        font-size: 12px;
      }
      .custom-marker.end-marker {
        background-color: #708191;
        width: 28px !important;
        height: 28px !important;
        font-size: 12px;
      }

      /* 側邊抽屌 */
      #side-drawer {
        position: fixed;
        top: 0; left: 0; bottom: 0;
        width: 300px;
        background: #F5F3ED;
        z-index: 3000;
        transform: translateX(-100%);
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 4px 0 20px rgba(0,0,0,0.1);
        overflow-y: auto;
      }
      #side-drawer.open { transform: translateX(0); }
      #drawer-overlay {
        position: fixed; inset: 0;
        background: rgba(74,74,74,0.3);
        z-index: 2999;
        opacity: 0; pointer-events: none;
        transition: opacity 0.3s;
      }
      #drawer-overlay.open { opacity: 1; pointer-events: auto; }

      /* 搜尋下拉列表 */
      #search-results {
        position: absolute;
        top: calc(100% + 4px);
        left: 1rem; right: 1rem;
        background: white;
        border-radius: 1rem;
        box-shadow: 0 8px 20px rgba(74,74,74,0.1);
        max-height: 250px;
        overflow-y: auto;
        display: none;
        z-index: 1002;
      }

      /* 過濾下拉 */
      #filter-dropdown {
        position: absolute;
        top: calc(100% + 4px);
        right: 1rem;
        width: 200px;
        background: white;
        border-radius: 1rem;
        box-shadow: 0 8px 20px rgba(74,74,74,0.1);
        display: none;
        z-index: 1002;
        padding: 0.5rem 0;
      }

      /* Toast 通知 */
      #toast-container {
        position: fixed;
        bottom: 5rem;
        left: 50%; transform: translateX(-50%);
        z-index: 5000;
        pointer-events: none;
      }
      .toast-msg {
        background: rgba(74,74,74,0.9);
        color: white;
        padding: 0.75rem 1.5rem;
        border-radius: 1rem;
        font-size: 0.875rem;
        margin-top: 0.5rem;
        animation: toastIn 0.3s ease, toastOut 0.3s ease 1.7s forwards;
        white-space: nowrap;
      }
      @keyframes toastIn { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }
      @keyframes toastOut { from { opacity:1; } to { opacity:0; transform: translateY(-10px); } }

      .setting-toggle.active {
        background: rgba(143, 162, 149, 0.14);
        border-color: rgba(143, 162, 149, 0.35);
      }

      .route-option-card {
        transition: border-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      }
      .route-option-card.active {
        border-color: rgba(143, 162, 149, 0.8);
        background: rgba(143, 162, 149, 0.08);
        box-shadow: 0 8px 18px rgba(74, 74, 74, 0.08);
      }
      .route-option-strip {
        display: flex;
        gap: 0.75rem;
        overflow-x: auto;
        padding-bottom: 0.25rem;
        scroll-snap-type: x proximity;
      }
      .route-option-strip::-webkit-scrollbar {
        display: none;
      }
      .route-option-stack {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        margin-bottom: 0.75rem;
      }
      .route-option-meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
      }
      .route-option-viewport {
        position: relative;
      }
      .route-option-viewport::after {
        content: '';
        position: absolute;
        top: 0;
        right: 0;
        width: 38px;
        height: calc(100% - 4px);
        pointer-events: none;
        background: linear-gradient(90deg, rgba(245, 243, 237, 0), rgba(245, 243, 237, 0.92));
        border-radius: 0 1rem 1rem 0;
      }
      .route-option-card.compact {
        min-width: 220px;
        max-width: 240px;
        scroll-snap-align: start;
      }
      .route-active-header {
        display: flex;
        align-items: stretch;
        gap: 0.75rem;
        margin-bottom: 1rem;
      }
      .route-active-card {
        flex: 1;
        min-width: 0;
      }
      .route-active-card-shell {
        height: 100%;
        border-radius: 1.25rem;
        border: 1px solid rgba(216, 213, 207, 0.7);
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.98), rgba(245, 243, 237, 0.94));
        box-shadow: 0 10px 24px rgba(74, 74, 74, 0.08);
        padding: 0.95rem 1rem;
      }
      .route-active-chip {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        padding: 0.35rem 0.65rem;
        border-radius: 9999px;
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid rgba(216, 213, 207, 0.8);
        font-size: 0.7rem;
        font-weight: 700;
        color: #4a4a4a;
        white-space: nowrap;
      }
      .route-active-actions {
        width: 108px;
        flex-shrink: 0;
      }
      .nav-active-top-panel {
        display: flex;
        flex-direction: column;
        gap: 0.7rem;
      }
      .nav-active-top-summary {
        min-width: 0;
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }
      .nav-active-top-copy {
        min-width: 0;
        flex: 1;
      }
      .nav-active-top-controls {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        gap: 0.6rem;
      }
      .transition-action-btn {
        width: 100%;
        min-height: 72px;
        border-radius: 1.1rem;
        padding: 0.75rem 0.65rem;
        box-shadow: 0 10px 20px rgba(74, 74, 74, 0.1);
        line-height: 1.2;
      }
      .nav-active-top-controls .transition-action-btn {
        min-height: 58px;
        padding: 0.7rem 0.8rem;
        display: flex;
      }
      .transition-action-btn:disabled {
        opacity: 0.45;
        box-shadow: none;
        pointer-events: none;
      }
      .transition-action-btn.secondary {
        box-shadow: 0 8px 18px rgba(74, 74, 74, 0.08);
      }
      .transition-action-kicker {
        display: block;
        font-size: 0.68rem;
        font-weight: 800;
        letter-spacing: 0.04em;
        opacity: 0.75;
      }
      .transition-action-label {
        display: block;
        margin-top: 0.3rem;
        font-size: 0.88rem;
        font-weight: 800;
        word-break: break-word;
      }
      @media (max-width: 380px) {
        .route-active-header {
          gap: 0.55rem;
        }
        .route-active-actions {
          width: 96px;
        }
        .nav-active-top-controls {
          gap: 0.5rem;
        }
        .transition-action-btn {
          min-height: 68px;
          padding-inline: 0.55rem;
        }
      }
      .sheet-mode-panel {
        height: calc(90vh - 30px);
        min-height: calc(90vh - 30px);
      }
      .sheet-scroll-region {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
      }
      .route-sheet-scroll-region {
        overflow: hidden;
      }
      .route-stats-bar {
        flex-shrink: 0;
        border-bottom: 1px solid rgba(216, 213, 207, 0.5);
        padding-bottom: 0.75rem;
        margin-bottom: 0.5rem;
      }
      .route-steps-shell {
        position: relative;
        min-height: 0;
        flex: 1;
      }
      .route-steps-shell::after {
        content: '';
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        height: 18px;
        pointer-events: none;
        z-index: 2;
        background: linear-gradient(0deg, rgba(245, 243, 237, 0.98), rgba(245, 243, 237, 0));
      }
      .with-fixed-sheet-footer {
        padding-bottom: calc(var(--sheet-fixed-footer-height) + env(safe-area-inset-bottom, 0px) + 0.75rem);
      }
      .route-steps-scrollbox {
        min-height: 0;
        max-height: min(55vh, calc(90vh - 220px));
        overflow-y: auto;
        overscroll-behavior: contain;
        -webkit-overflow-scrolling: touch;
        padding-right: 0.5rem;
        scrollbar-width: thin;
        scrollbar-color: rgba(148, 163, 184, 0.75) transparent;
      }
      .route-step-item[data-current-step="true"] {
        scroll-margin-top: 16px;
        scroll-margin-bottom: 28px;
      }
      .route-steps-scrollbox::-webkit-scrollbar {
        width: 6px;
      }
      .route-steps-scrollbox::-webkit-scrollbar-track {
        background: transparent;
      }
      .route-steps-scrollbox::-webkit-scrollbar-thumb {
        background: rgba(148, 163, 184, 0.65);
        border-radius: 9999px;
      }
      #sheet-action-bar {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 1002;
        padding: 0 1rem calc(1rem + env(safe-area-inset-bottom, 0px));
        opacity: 0;
        pointer-events: none;
        transform: translateY(calc(100% + env(safe-area-inset-bottom, 0px)));
        transition: opacity 0.24s ease, transform 0.24s ease;
      }
      #sheet-action-bar.visible {
        opacity: 1;
        pointer-events: auto;
        transform: translateY(0);
      }
      #sheet-action-bar::before {
        content: '';
        position: absolute;
        left: 0;
        right: 0;
        top: -20px;
        height: 24px;
        background: linear-gradient(180deg, rgba(245, 243, 237, 0), rgba(245, 243, 237, 0.94) 72%, #f5f3ed 100%);
        pointer-events: none;
      }
      .sheet-action-bar-shell {
        position: relative;
        background: #f5f3ed;
        border-top-left-radius: 1.5rem;
        border-top-right-radius: 1.5rem;
        box-shadow: none;
        border-top: 1px solid rgba(216, 213, 207, 0.36);
        padding: 0.9rem 1rem 0;
      }
      .sheet-action-bar-group {
        display: none;
        align-items: center;
        gap: 0.75rem;
      }
      .sheet-action-bar-group.active {
        display: flex;
      }
      @supports (height: 100dvh) {
        .sheet-mode-panel {
          height: calc(90dvh - 30px);
          min-height: calc(90dvh - 30px);
        }
        .route-steps-scrollbox {
          max-height: min(50dvh, calc(90dvh - 260px));
        }
      }
      .building-option-card {
        min-width: 236px;
        max-width: 260px;
        scroll-snap-align: start;
      }

      .building-label {
        height: 36px;
        box-sizing: border-box;
        display: flex;
        align-items: center;
        padding: 6px 10px;
        width: 100%;
        min-width: 0;
      }
      .building-label-content {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        min-width: 0;
      }
      .building-label-icon {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .building-label-text {
        text-align: right;
        white-space: nowrap;
        overflow: visible;
        text-overflow: clip;
      }

      .life-card {
        background: linear-gradient(135deg, rgba(255,255,255,0.98), rgba(245,243,237,0.92));
      }

      /* 導航模式 search bar */
      /* search-nav-mode 由 JS 控制顯示狀態 */

      .hidden-initial {
        display: none;
      }

      #floor-control {
        position: relative;
      }

      #floor-picker {
        position: absolute;
        right: calc(100% + 0.75rem);
        top: 0;
        width: 120px;
        box-shadow: 0 8px 24px rgba(74, 74, 74, 0.14);
        z-index: 1002;
      }

      #status-banner {
        position: fixed;
        top: 5.25rem;
        left: 1rem;
        right: 1rem;
        z-index: 2500;
        display: none;
      }
      #status-banner.visible {
        display: block;
      }
    </style>
  </head>
  <body class="bg-bg text-dark">
    <!-- Leaflet 地圖容器 -->
    <div id="map"></div>

    <div id="status-banner" role="status" aria-live="polite"></div>

    <!-- 側邊抽屌過濾層 -->
    <div id="drawer-overlay" onclick="toggleDrawer()"></div>

    <!-- 側邊抽屌 -->
    <div id="side-drawer">
      <div class="p-6 border-b border-border">
        <div class="flex items-center justify-between mb-1">
          <h2 class="text-lg font-bold text-dark">校園導航系統</h2>
          <button onclick="toggleDrawer()" class="w-8 h-8 rounded-full hover:bg-border/50 flex items-center justify-center text-slate" title="關閉側邊選單" aria-label="關閉側邊選單">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>
        <p class="text-xs text-slate">Demo v2.0</p>
      </div>
      <div class="p-4">
        <p class="text-xs text-slate uppercase font-bold mb-3 px-2">收藏地點</p>
        <div id="drawer-favorites" class="mb-4">
          <p class="text-sm text-slate/70 px-2 py-3">尚無收藏地點</p>
        </div>
        <div class="border-t border-border/50 pt-4">
          <p class="text-xs text-slate uppercase font-bold mb-3 px-2">設定</p>
          <button id="setting-accessible" onclick="togglePreference('accessible')" class="setting-toggle w-full text-left flex items-center gap-3 px-2 py-3 rounded-xl hover:bg-white transition-colors border border-transparent">
            <i class="fa-solid fa-universal-access text-sage"></i>
            <span class="text-sm text-dark">無障礙路線優先</span>
          </button>
          <button id="setting-indoor" onclick="togglePreference('indoorPreferred')" class="setting-toggle w-full text-left flex items-center gap-3 px-2 py-3 rounded-xl hover:bg-white transition-colors border border-transparent">
            <i class="fa-solid fa-building text-slate"></i>
            <span class="text-sm text-dark">室內優先</span>
          </button>
          <button id="setting-life" onclick="togglePreference('funMode')" class="setting-toggle w-full text-left flex items-center gap-3 px-2 py-3 rounded-xl hover:bg-white transition-colors border border-transparent">
            <i class="fa-solid fa-compass text-yellow"></i>
            <span class="text-sm text-dark">生活探索推薦</span>
          </button>
        </div>
      </div>
    </div>

    <!-- UI: 頂部搜尋框 -->
    <div id="search-bar" class="overlay">
      <!-- 模式 A: 一般搜尋 -->
      <div id="search-normal-mode" class="bg-white rounded-2xl shadow-soft flex items-center px-4 py-3 border border-border relative">
        <button onclick="toggleDrawer()" class="mr-4 text-slate text-lg hover:text-dark transition-colors" title="開啟側邊選單" aria-label="開啟側邊選單">
          <i class="fa-solid fa-bars"></i>
        </button>
        <input
          id="search-input"
          type="text"
          placeholder="搜尋校園地點..."
          class="flex-1 bg-transparent outline-none text-dark placeholder-slate/60 text-base"
          aria-label="搜尋校園地點"
          oninput="onSearchInput(this.value)"
          onfocus="onSearchFocus()"
        />
        <button id="search-clear" onclick="clearSearch()" class="mr-2 text-slate text-sm hidden hover:text-dark transition-colors" title="清除搜尋" aria-label="清除搜尋">
          <i class="fa-solid fa-circle-xmark"></i>
        </button>
        <button onclick="toggleFilter()" class="text-sage text-lg hover:text-dark transition-colors" title="開啟篩選選單" aria-label="開啟篩選選單">
          <i class="fa-solid fa-sliders"></i>
        </button>
      </div>
      <!-- 模式 B: 導航起終點雙欄 -->
      <div id="search-nav-mode" class="hidden-initial bg-white rounded-2xl shadow-soft border border-border px-3 py-2.5">
        <div id="nav-search-edit-panel" class="flex items-center gap-2">
          <button onclick="cancelNavBar()" class="text-slate text-lg hover:text-dark transition-colors px-1" title="返回上一步" aria-label="返回上一步">

    <!-- 邏輯執行 -->
    <script>
      // === 1. 載入節點與路網資料 ===
      const MAP_CENTER = [23.9515, 120.9252]; // 暨大管院附近大致座標
      const currentFloor = 1;

      let nodes = [];
      let edges = [];
      let rawPaths = [];

      // === Haversine 距離計算 & Dijkstra 最短路徑 ===
      function haversineDistance(lat1, lng1, lat2, lng2) {
        const R = 6371000;
        const toRad = (deg) => (deg * Math.PI) / 180;
        const dLat = toRad(lat2 - lat1);
        const dLng = toRad(lng2 - lng1);
        const a =
          Math.sin(dLat / 2) ** 2 +
          Math.cos(toRad(lat1)) *
            Math.cos(toRad(lat2)) *
            Math.sin(dLng / 2) ** 2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      }

      // --- 幾何輔助：點到線段的最近投影 ---
      function pointToSegmentProjection(px, py, ax, ay, bx, by) {
        const dx = bx - ax, dy = by - ay;
        const lenSq = dx * dx + dy * dy;
        if (lenSq === 0) return { x: ax, y: ay, t: 0 };
        let t = ((px - ax) * dx + (py - ay) * dy) / lenSq;
        t = Math.max(0, Math.min(1, t)); // 限制在線段範圍 [0,1]
        return { x: ax + t * dx, y: ay + t * dy, t };
      }

      function copyEdgeRenderMeta(edge, overrides = {}) {
        return {
          pathType: edge?.pathType || null,
          pathId: edge?.pathId || null,
          previewFloors: Array.isArray(edge?.previewFloors) ? [...edge.previewFloors] : null,
          connector: !!edge?.connector,
          ...overrides,
        };
      }

      // 將 POI 節點投影到最近的路徑線段
      function snapToPathNetwork(nodeId, tempNodes, tempEdges) {
        const node = tempNodes.find(n => n.id === nodeId);
        if (!node) return;

        // 如果節點已在路徑網路中（有 edge 連接），不需投影
        const hasEdge = tempEdges.some(e => e.source === nodeId || e.target === nodeId);
        if (hasEdge) return;

        // 找最近的路徑線段 (限同樓層且屬性相容：室內找室內，室外找室外)
        const isNodeOutdoor = !!node.isOutdoor || (!node.building && !Number.isInteger(node.buildingFloor));

        let bestDist = Infinity, bestProj = null, bestEdgeIdx = -1;
        tempEdges.forEach((e, idx) => {
          if (e.isVertical) return;
          const sNode = tempNodes.find(n => n.id === e.source);
          const tNode = tempNodes.find(n => n.id === e.target);
          if (!sNode || !tNode) return;
          if (sNode.floor !== node.floor || tNode.floor !== node.floor) return;

          // 屬性相容性檢查 (只有室外節點才能投影到室外路徑，反之亦然)
          const isEdgeOutdoor = (sNode.isOutdoor || (!sNode.building && !Number.isInteger(sNode.buildingFloor))) &&
                                (tNode.isOutdoor || (!tNode.building && !Number.isInteger(tNode.buildingFloor)));

          // 嚴格限制：室內點只能投室內線，室外點只能投室外線
          // 唯一的例外是 Entrance：它可以往室外投，也可以往室內投。
          if (node.type !== 'entrance') {
              // 對於非出入口的節點，若是 waypoint（投影點），也稍微放寬，
              // 因為 waypoint 的 isOutdoor 我們在前面強硬繼承，但有可能在交界處。
              // 保守起見，原始節點若是室內，就不能投室外路徑。
              if (isNodeOutdoor && !isEdgeOutdoor) return;
              if (!isNodeOutdoor && isEdgeOutdoor) return;
          }

          const proj = pointToSegmentProjection(
            node.coordinates[0], node.coordinates[1],
            sNode.coordinates[0], sNode.coordinates[1],
            tNode.coordinates[0], tNode.coordinates[1]
          );
          const d = haversineDistance(node.coordinates[0], node.coordinates[1], proj.x, proj.y);
          if (d < bestDist) { bestDist = d; bestProj = proj; bestEdgeIdx = idx; }
        });

        if (bestEdgeIdx === -1) return;

        const edge = tempEdges[bestEdgeIdx];
        const sNode = tempNodes.find(n => n.id === edge.source);
        const tNode = tempNodes.find(n => n.id === edge.target);

        // 投影點如果極度接近既有端點（<0.1m），才不建虛擬節點，避免斜切繞路
        const distToSource = haversineDistance(bestProj.x, bestProj.y, sNode.coordinates[0], sNode.coordinates[1]);
        const distToTarget = haversineDistance(bestProj.x, bestProj.y, tNode.coordinates[0], tNode.coordinates[1]);
        if (distToSource < 0.1) {
          tempEdges.push({ source: nodeId, target: edge.source, isVertical: false, ...copyEdgeRenderMeta(edge, { connector: true }) });
          return;
        }
        if (distToTarget < 0.1) {
          tempEdges.push({ source: nodeId, target: edge.target, isVertical: false, ...copyEdgeRenderMeta(edge, { connector: true }) });
          return;
        }

        // 建立虛擬投影節點
        const vpId = '__vp_' + nodeId;
        tempNodes.push({
          id: vpId, name: '投影點', type: 'waypoint',
          floor: node.floor,
          coordinates: [parseFloat(bestProj.x.toFixed(6)), parseFloat(bestProj.y.toFixed(6))],
          isPOI: false,
          isOutdoor: isNodeOutdoor, // 繼承原本節點的室內外屬性
          building: node.building
        });

        // 分割原始線段
        tempEdges.splice(bestEdgeIdx, 1);
        tempEdges.push({ source: edge.source, target: vpId, isVertical: false, ...copyEdgeRenderMeta(edge) });
        tempEdges.push({ source: vpId, target: edge.target, isVertical: false, ...copyEdgeRenderMeta(edge) });
        tempEdges.push({ source: nodeId, target: vpId, isVertical: false, ...copyEdgeRenderMeta(edge, { connector: true }) });
      }

        function isBoundaryEdgeAllowed(sourceNode, targetNode) {
          const sourceIsEntrance = sourceNode.type === 'entrance' && sourceNode.isGroundLevel;
          const targetIsEntrance = targetNode.type === 'entrance' && targetNode.isGroundLevel;
          const sourceIsEntranceVP = sourceNode.type === 'waypoint' && targetIsEntrance;
          const targetIsEntranceVP = targetNode.type === 'waypoint' && sourceIsEntrance;
          return sourceIsEntrance || targetIsEntrance || sourceIsEntranceVP || targetIsEntranceVP;
        }

        function describeTransitionBetweenNodes(fromNode, toNode, edge = null) {
          const realFloorDelta = Math.abs((toNode.realFloor ?? toNode.floor ?? 0) - (fromNode.realFloor ?? fromNode.floor ?? 0)) || 1;
          const displayTargetFloor = getNodeDisplayFloor(toNode);

          if (isOutdoorNode(fromNode) !== isOutdoorNode(toNode)) {
            return {
              kind: isOutdoorNode(toNode) ? 'exit' : 'enter',
              actionLabel: isOutdoorNode(toNode) ? '離開室內' : '進入室內',
              shortName: isOutdoorNode(toNode) ? '前往戶外' : '返回室內',
              iconClass: isOutdoorNode(toNode) ? 'fa-arrow-up-right-from-square' : 'fa-door-open',
              accentClass: 'text-slate font-medium',
              targetFloor: displayTargetFloor,
              actualDistance: 0,
              etaExtra: 0.15,
            };
          }

          if (edge?.pathType === 'ramp') {
            return {
              kind: 'ramp',
              actionLabel: '走斜坡',
              shortName: '斜坡',
              iconClass: 'fa-road',
              accentClass: 'text-blue-600 font-bold',
              targetFloor: displayTargetFloor,
              actualDistance: 12 * realFloorDelta,
              etaExtra: 0.55 * realFloorDelta,
            };
          }

          if ((fromNode.realFloor ?? fromNode.floor) !== (toNode.realFloor ?? toNode.floor)) {
            if (fromNode.type === 'elevator' || toNode.type === 'elevator') {
              return {
                kind: 'elevator',
                actionLabel: '搭乘電梯',
                shortName: '電梯',
                iconClass: 'fa-elevator',
                accentClass: 'text-yellow font-bold',
                targetFloor: displayTargetFloor,
                actualDistance: 8 * realFloorDelta,
                etaExtra: 1.1 * realFloorDelta,
              };
            }
            return {
              kind: 'stairs',
              actionLabel: '走樓梯',
              shortName: '樓梯',
              iconClass: 'fa-stairs',
              accentClass: 'text-sage font-bold',
              targetFloor: displayTargetFloor,
              actualDistance: 10 * realFloorDelta,
              etaExtra: 0.45 * realFloorDelta,
            };
          }

          return null;
        }

        function getVerticalTransitionCost(transition, options = {}) {
          if (!transition) return 150;
          if (transition.kind === 'elevator') {
            return transition.actualDistance + (options.preferElevator ? 42 : 78) + (transition.etaExtra || 0) * 10;
          }
          if (transition.kind === 'stairs') {
            return transition.actualDistance + 18;
          }
          if (transition.kind === 'ramp') {
            return transition.actualDistance + 10;
          }
          return transition.actualDistance + 80;
        }

        function getRouteStrategyBadges(route) {
          const badges = [];
          if (route.key === 'shortest') badges.push({ text: '最短路徑', className: 'bg-sage/15 text-sage' });
          if (route.key === 'indoor') badges.push({ text: '室內優先', className: 'bg-dark/5 text-dark' });
          if (route.key === 'accessible') badges.push({ text: '無障礙', className: 'bg-sage/10 text-sage' });
          if (route.key === 'scenic') badges.push({ text: '探索散步', className: 'bg-yellow/30 text-dark' });
          return badges;
        }

        function findShortestPath(startId, endId, options = {}) {
        // 深拷貝 nodes 和 edges，避免汙染原始資料
        const tempNodes = nodes.map(n => ({ ...n, coordinates: [...n.coordinates] }));
        const tempEdges = edges.map(e => ({ ...e }));

        // 將起終點投影到最近的路徑線段
        snapToPathNetwork(startId, tempNodes, tempEdges);
        snapToPathNetwork(endId, tempNodes, tempEdges);

        // 建立鄰接表
        const adj = {};
        tempNodes.forEach((n) => (adj[n.id] = []));
        tempEdges.forEach((e) => {
          const sNode = tempNodes.find((n) => n.id === e.source);
          const tNode = tempNodes.find((n) => n.id === e.target);
          if (!sNode || !tNode) return;

          if (e.isVertical) {
            const transition = describeTransitionBetweenNodes(sNode, tNode, e);
            if (options.accessible && transition?.kind === 'stairs') return;

            const verticalCost = getVerticalTransitionCost(transition, options);

            const edgeMeta = {
              to: e.target,
              dist: verticalCost,
              actualDistance: transition?.actualDistance || 0,
              etaExtra: transition?.etaExtra || 0.4,
              descriptor: transition,
              isOutdoor: !!sNode.isOutdoor || !!tNode.isOutdoor,
              pathId: e.pathId || null,
              pathType: e.pathType || null,
              previewFloors: Array.isArray(e.previewFloors) ? [...e.previewFloors] : null,
              connector: !!e.connector,
            };
            const reverseMeta = { ...edgeMeta, to: e.source, descriptor: describeTransitionBetweenNodes(tNode, sNode, e) || transition };
            adj[e.source].push(edgeMeta);
            adj[e.target].push(reverseMeta);
            return;
          }

          const isSourceOutdoor = !!sNode.isOutdoor;
          const isTargetOutdoor = !!tNode.isOutdoor;

          if (isSourceOutdoor !== isTargetOutdoor) {
            if (!isBoundaryEdgeAllowed(sNode, tNode)) return;
          }

          if (options.accessible && (!isAccessibleNode(sNode) || !isAccessibleNode(tNode))) return;

          const baseDistance = haversineDistance(
            sNode.coordinates[0],
            sNode.coordinates[1],
            tNode.coordinates[0],
            tNode.coordinates[1],
          );
          const isOutdoorSegment = isSourceOutdoor && isTargetOutdoor;

          let cost = baseDistance;
          if (isOutdoorSegment) cost += options.outdoorPenalty || 0;
          else cost += options.indoorPenalty || 0;

          const boundaryTransition = describeTransitionBetweenNodes(sNode, tNode, e);
          const edgeMeta = {
            to: e.target,
            dist: cost,
            actualDistance: baseDistance,
            etaExtra: boundaryTransition?.etaExtra || 0,
            descriptor: boundaryTransition,
            isOutdoor: isOutdoorSegment,
            pathId: e.pathId || null,
            pathType: e.pathType || null,
            previewFloors: Array.isArray(e.previewFloors) ? [...e.previewFloors] : null,
            connector: !!e.connector,
          };
          const reverseMeta = { ...edgeMeta, to: e.source, descriptor: describeTransitionBetweenNodes(tNode, sNode, e) || boundaryTransition };
          adj[e.source].push(edgeMeta);
          adj[e.target].push(reverseMeta);
        });

        // Dijkstra
        const dist = {};
        const prev = {};
        const prevMeta = {};
        const visited = new Set();
        tempNodes.forEach((n) => (dist[n.id] = Infinity));
        dist[startId] = 0;

        while (true) {
          let u = null;
          let minD = Infinity;
          for (const id in dist) {
            if (!visited.has(id) && dist[id] < minD) {
              minD = dist[id];
              u = id;
            }
          }
          if (u === null || u === endId) break;
          visited.add(u);
          for (const edge of adj[u]) {
            const alt = dist[u] + edge.dist;
            if (alt < dist[edge.to]) {
              dist[edge.to] = alt;
              prev[edge.to] = u;
              prevMeta[edge.to] = edge;
            }
          }
        }

        if (dist[endId] === Infinity) {
          return null;
        }

        const path = [];
        const stepDetails = [];
        let actualDistance = 0;
        let estimatedMinutes = 0;
        let outdoorDistance = 0;
        let cur = endId;
        while (cur) {
          path.unshift(tempNodes.find((n) => n.id === cur));
          if (prevMeta[cur]) {
            stepDetails.unshift(prevMeta[cur]);
            actualDistance += prevMeta[cur].actualDistance || 0;
            estimatedMinutes += (prevMeta[cur].actualDistance || 0) / 78 + (prevMeta[cur].etaExtra || 0);
            if (prevMeta[cur].isOutdoor) outdoorDistance += prevMeta[cur].actualDistance || 0;
          }
          cur = prev[cur];
        }

        // 取得起終點的投影節點座標（法線投影端點）
        const startVP = tempNodes.find(n => n.id === '__vp_' + startId);
        const endVP = tempNodes.find(n => n.id === '__vp_' + endId);
        const startOrig = tempNodes.find(n => n.id === startId);
        const endOrig = tempNodes.find(n => n.id === endId);
        return {
          path,
          steps: stepDetails,
          weightedCost: dist[endId],
          actualDistance,
          estimatedMinutes,
          outdoorDistance,
          startProjection: startVP ? { from: startOrig.coordinates, to: startVP.coordinates } : null,
          endProjection: endVP ? { from: endVP.coordinates, to: endOrig.coordinates } : null,
        };
      }

      function summarizeRoute(route) {
        const descriptors = (route?.steps || []).map(step => step.descriptor).filter(Boolean);
        const outdoorDistance = route?.outdoorDistance || 0;
        const actualDistance = route?.actualDistance || 0;
        return {
          outdoorDistance,
          outdoorRatio: actualDistance > 0 ? outdoorDistance / actualDistance : 0,
          hasOutdoorExposure: outdoorDistance > 8,
          stairsCount: descriptors.filter(descriptor => descriptor.kind === 'stairs').length,
          elevatorCount: descriptors.filter(descriptor => descriptor.kind === 'elevator').length,
          rampCount: descriptors.filter(descriptor => descriptor.kind === 'ramp').length,
          floorChangeCount: descriptors.filter(descriptor => ['stairs', 'elevator', 'ramp'].includes(descriptor.kind)).length,
          boundaryCount: descriptors.filter(descriptor => descriptor.kind === 'enter' || descriptor.kind === 'exit').length,
        };
      }

      function getVisibleRouteKeys(routeByKey, startNodeRef, endNodeRef) {
        const visible = new Set();
        const shortestRoute = routeByKey.shortest;
        if (!shortestRoute) return visible;

        const summaryByKey = Object.fromEntries(
          Object.entries(routeByKey).map(([key, route]) => [key, summarizeRoute(route)])
        );

        const shortestSummary = summaryByKey.shortest;
        const startOrEndOutdoor = isOutdoorNode(startNodeRef) || isOutdoorNode(endNodeRef);
        const anyOutdoorRoute = Object.values(summaryByKey).some(summary => summary.hasOutdoorExposure);
        const anyFloorChangeRoute = Object.values(summaryByKey).some(summary => summary.floorChangeCount > 0);
        const anyStairRoute = Object.values(summaryByKey).some(summary => summary.stairsCount > 0);

        visible.add('shortest');

        const indoorRoute = routeByKey.indoor;
        const indoorSummary = summaryByKey.indoor;
        if (indoorRoute && indoorSummary) {
          const changesPath = indoorRoute.pathSignature !== shortestRoute.pathSignature;
          const reducesOutdoor = indoorSummary.outdoorDistance + 8 < shortestSummary.outdoorDistance;
          const indoorRelevant = (startOrEndOutdoor || anyOutdoorRoute || shortestSummary.boundaryCount > 0) && (changesPath || reducesOutdoor);
          if (indoorRelevant) visible.add('indoor');
        }

        const accessibleRoute = routeByKey.accessible;
        const accessibleSummary = summaryByKey.accessible;
        if (accessibleRoute && accessibleSummary) {
          const changesPath = accessibleRoute.pathSignature !== shortestRoute.pathSignature;
          const removesStairs = accessibleSummary.stairsCount < shortestSummary.stairsCount;
          const accessibleRelevant = userPreferences.accessible || anyFloorChangeRoute || anyStairRoute || shortestSummary.stairsCount > 0;
          if (accessibleRelevant && (changesPath || removesStairs || accessibleSummary.stairsCount === 0)) {
            visible.add('accessible');
          }
        }

        const scenicRoute = routeByKey.scenic;
        const scenicSummary = summaryByKey.scenic;
        if (scenicRoute && scenicSummary) {
          const changesPath = scenicRoute.pathSignature !== shortestRoute.pathSignature;
          const addsOutdoor = scenicSummary.outdoorDistance > shortestSummary.outdoorDistance + 12;
          const scenicRelevant = scenicSummary.hasOutdoorExposure && (scenicSummary.outdoorDistance >= 25 || scenicSummary.outdoorRatio >= 0.18);
          if (scenicRelevant && (startOrEndOutdoor || anyOutdoorRoute) && (changesPath || addsOutdoor)) {
            visible.add('scenic');
          }
        }

        return visible;
      }

      function buildRouteOptions(startId, endId, preferredKey = null) {
        const profiles = routeProfileCatalog.map(profile => {
          const mergedOptions = { ...profile.options };
          if (userPreferences.accessible && profile.key !== 'accessible') mergedOptions.accessible = false;
          const route = findShortestPath(startId, endId, mergedOptions);
          if (!route?.path?.length) return null;
          return {
            ...profile,
            ...route,
            pathSignature: route.path.map(n => n.id).join('>'),
          };
        }).filter(Boolean);

        const unique = [];
        const seen = new Set();
        profiles.forEach(profile => {
          if (seen.has(profile.pathSignature)) return;
          seen.add(profile.pathSignature);
          unique.push(profile);
        });

        if (!unique.length) return [];

        const startNodeRef = getNodeById(startId);
        const endNodeRef = getNodeById(endId);
        const routeByKey = Object.fromEntries(unique.map(route => [route.key, route]));
        const visibleKeys = getVisibleRouteKeys(routeByKey, startNodeRef, endNodeRef);
        const filtered = unique.filter(route => visibleKeys.has(route.key));

        if (!filtered.length && unique[0]) {
          filtered.push(unique[0]);
        }

        const defaultKey = preferredKey || getDefaultRouteKey();
        const fallback = filtered.find(route => route.key === defaultKey) || filtered[0];
        selectedRouteKey = fallback.key;
        return filtered;
      }

        function createNoopMap() {

      // === 2. 初始化 Leaflet 地圖 ===

      // === 共用資料/格式 ===
      function getNodeBaseId(node) {
        return node?.originalId || node?.id;
      }

      function getBuildingById(buildingId) {
        return buildings.find(building => building.id === buildingId) || null;
      }

      function getBuildingFloorMap(buildingId) {
        return getBuildingById(buildingId)?.floorMap || [];
      }

      function getBuildingFirstFloorRealFloorValue(floorMap = []) {
        const firstFloorEntry = floorMap.find(entry => Number(entry.buildingFloor) === 1);
        if (firstFloorEntry) return Number(firstFloorEntry.realFloor);
        const fallbackEntry = [...floorMap]
          .map(entry => ({
            buildingFloor: Number(entry.buildingFloor),
            realFloor: Number(entry.realFloor),
          }))
          .filter(entry => Number.isInteger(entry.buildingFloor) && Number.isInteger(entry.realFloor))
          .sort((a, b) => a.buildingFloor - b.buildingFloor)[0];
        return fallbackEntry ? fallbackEntry.realFloor - (fallbackEntry.buildingFloor - 1) : 1;
      }

      function mapBuildingFloorToRealFloor(buildingId, buildingFloor) {
        const mapping = getBuildingFloorMap(buildingId)
          .find(entry => Number(entry.buildingFloor) === Number(buildingFloor));
        if (mapping) return Number(mapping.realFloor);
        const anchor = getBuildingFirstFloorRealFloorValue(getBuildingFloorMap(buildingId));
        return Number.isInteger(anchor) ? anchor + (Number(buildingFloor) - 1) : Number(buildingFloor);
      }

      function getRawNodeBuildingFloors(node) {
        if (Array.isArray(node?.buildingFloors) && node.buildingFloors.length) {
          return [...new Set(node.buildingFloors.map(Number).filter(Number.isInteger))].sort((a, b) => a - b);
        }
        if (Array.isArray(node?.floors) && node.floors.length && node.building && !node.isOutdoor) {
          return [...new Set(node.floors.map(Number).filter(Number.isInteger))].sort((a, b) => a - b);
        }
        if (Number.isInteger(node?.floor) && node.building && !node.isOutdoor) {
          return [Number(node.floor)];
        }
        return [];
      }

      function getRawNodeRealFloors(node) {
        if (Array.isArray(node?.realFloors) && node.realFloors.length) {
          return [...new Set(node.realFloors.map(Number).filter(Number.isInteger))].sort((a, b) => a - b);
        }
        const buildingFloors = getRawNodeBuildingFloors(node);
        if (buildingFloors.length && node.building) {
          return buildingFloors.map(buildingFloor => mapBuildingFloorToRealFloor(node.building, buildingFloor));
        }
        if (Array.isArray(node?.floors) && node.floors.length) {

      function getRawPathBuildingFloors(path) {

      function getRawPathRealFloors(path) {

      function getNodeDisplayFloor(node) {

      function getNodeCampusLevel(node) {

        function isNodeInBuildingContext(node, buildingId = selectedBuilding) {

      function getNodeDisplayLabel(node) {

      function getCampusRealFloors() {

      function getCurrentFloorMode() {

      function getActiveNodeFloorValue(node) {

      function matchesActiveFloor(node) {

      function getNodeById(nodeId) {

      function getFallbackLocationNode() {
        return nodes.find(n => n.isGroundLevel && n.type === 'entrance')

      function resolveNearestLocationNode(coords) {
        if (!coords) return null;

        if (!candidates.length) return null;

          .map(node => {

            return { node, score, distance };
          })
          .sort((a, b) => a.score - b.score || a.distance - b.distance)[0]?.node || null;
      }

      function getDefaultLocationNode() {
        return getNodeById(currentLocationNodeId) || getFallbackLocationNode();
      }

      function applyResolvedCurrentLocation(node, coords, { updateSelection = false, centerMap = false } = {}) {
        if (!node) return null;
        currentGeoPosition = coords || currentGeoPosition;
        currentLocationNodeId = node.id;

        if (updateSelection && !startNode && !destinationNode && navMode === 'explore') {
          selectedNode = node;
        }

        if (centerMap) {
          focusNodeContext(node);
          map.flyTo(node.coordinates, 19);
          renderMap();
        }

        return node;
      }

      function requestCurrentLocation({ silent = false, updateSelection = false, centerMap = false } = {}) {
        if (!navigator.geolocation) {
          if (!silent) showToast('目前裝置不支援定位，已改用校園預設入口');
          return Promise.resolve(getDefaultLocationNode());
        }

        if (isLocating) {
          return Promise.resolve(getDefaultLocationNode());
        }

        isLocating = true;
        return new Promise((resolve) => {
          navigator.geolocation.getCurrentPosition(
            (position) => {
              isLocating = false;
              const coords = {
                lat: position.coords.latitude,
                lng: position.coords.longitude,
              };
              const nearestNode = resolveNearestLocationNode(coords) || getFallbackLocationNode();
              resolve(applyResolvedCurrentLocation(nearestNode, coords, { updateSelection, centerMap }));
            },
            () => {
              isLocating = false;
              const fallbackNode = getFallbackLocationNode();
              if (!silent) showToast('定位失敗，已改用最近的校園預設入口');
              resolve(fallbackNode);
            },
            {
              enableHighAccuracy: true,
              timeout: 8000,
              maximumAge: 60000,
            }
          );
        });
      }

      function getBuildingName(node) {
        if (node?.building) {
          const building = getBuildingById(node.building);
          if (building) return building.name;
        }
        return node?.isOutdoor ? '室外區域' : '校園地點';
      }

      function formatFloorLabel(floor) {
        return floor < 0 ? `B${Math.abs(floor)}` : `${floor}F`;
      }

      function formatFloorNarration(floor) {
        if (floor < 0) return `地下${Math.abs(floor)}樓`;
        if (floor === 0) return '地面層';
        return `${floor}樓`;
      }

      function getUserFacingNodeArea(node) {
        return node?.isOutdoor ? '戶外' : `${getNodeDisplayLabel(node)} 室內`;
      }

      function getSegmentLabel(segment) {
        if (segment?.isRamp) return '斜坡';
        return segment?.isOutdoor ? '戶外' : formatFloorLabel(segment.floor);
      }

      function getTransitionTargetLabel(action, targetFloor, targetNode = null) {
        if (action?.kind === 'exit') return '戶外';
        if (action?.kind === 'enter') {
          if (targetNode && !targetNode.isOutdoor) return getUserFacingNodeArea(targetNode);
          return '室內';
        }
        if (Number.isFinite(targetFloor)) return formatFloorLabel(targetFloor);
        if (targetNode?.isOutdoor) return '戶外';
        if (targetNode) return getUserFacingNodeArea(targetNode);
        return '目標樓層';
      }

      function formatTransitionControlLabel(prefix, transition, fallbackVerb) {
        if (!transition?.action) return `${prefix}：${fallbackVerb}`;
        const action = transition.action;
        if (action.kind === 'enter' || action.kind === 'exit') {
          return `${prefix}：${action.shortName || action.actionLabel || fallbackVerb}`;
        }
        const targetLabel = getTransitionTargetLabel(action, transition.targetFloor, transition.targetNode);
        return `${prefix}：${action.shortName || action.actionLabel || fallbackVerb} ${targetLabel}`;
      }

      function formatTransitionControlActionLabel(transition, fallbackVerb) {
        if (!transition?.action) return fallbackVerb;
        const action = transition.action;
        if (action.kind === 'enter' || action.kind === 'exit') {
          return action.shortName || action.actionLabel || fallbackVerb;
        }
        const targetLabel = getTransitionTargetLabel(action, transition.targetFloor, transition.targetNode);
        return `${action.shortName || action.actionLabel || fallbackVerb} ${targetLabel}`;
      }

      function getBuildingCenter(building) {
        if (Array.isArray(building?.bounds) && building.bounds.length) {
          const totals = building.bounds.reduce((acc, point) => {
            acc.lat += Number(point[0]) || 0;
            acc.lng += Number(point[1]) || 0;
            return acc;
          }, { lat: 0, lng: 0 });
          return [totals.lat / building.bounds.length, totals.lng / building.bounds.length];
        }

        const entranceNodes = nodes.filter(node => node.building === building?.id && node.type === 'entrance');
        if (entranceNodes.length) {
          const totals = entranceNodes.reduce((acc, node) => {
            acc.lat += node.coordinates[0];
            acc.lng += node.coordinates[1];
            return acc;
          }, { lat: 0, lng: 0 });
          return [totals.lat / entranceNodes.length, totals.lng / entranceNodes.length];
        }

        return MAP_CENTER;
      }

      function getStandaloneOutdoorNodes() {
        return nodes.filter(node => node.isPOI && node.isOutdoor && !node.building);
      }

      function getOutdoorOverviewCenter() {
        const outdoorNodes = getStandaloneOutdoorNodes();
        if (!outdoorNodes.length) return MAP_CENTER;

        const totals = outdoorNodes.reduce((acc, node) => {
          acc.lat += node.coordinates[0];
          acc.lng += node.coordinates[1];
          return acc;
        }, { lat: 0, lng: 0 });

        return [totals.lat / outdoorNodes.length, totals.lng / outdoorNodes.length];
      }

      function refreshMapViewport() {
        const invalidate = () => map.invalidateSize({ pan: false, debounceMoveend: true });
        requestAnimationFrame(invalidate);
        setTimeout(invalidate, 120);
        setTimeout(invalidate, 360);
      }

      function focusOutdoorOnMap() {
        if (!hasLeaflet) return;
        const outdoorNodes = getStandaloneOutdoorNodes();
        refreshMapViewport();
        map.once('moveend', refreshMapViewport);

        if (outdoorNodes.length >= 2) {
          const latLngBounds = L.latLngBounds(outdoorNodes.map(node => node.coordinates));
          if (latLngBounds.isValid()) {
            map.flyToBounds(latLngBounds, {
              padding: [48, 48],
              maxZoom: 19,
              duration: 0.45,
            });
            return;
          }
        }

        map.flyTo(getOutdoorOverviewCenter(), 18, {
          duration: 0.45,
        });
      }

      function focusBuildingOnMap(buildingId) {
        if (!hasLeaflet) return;
        const building = getBuildingById(buildingId);
        if (!building) return;

        refreshMapViewport();
        map.once('moveend', refreshMapViewport);

        if (Array.isArray(building.bounds) && building.bounds.length >= 2) {
          const latLngBounds = L.latLngBounds(
            building.bounds.map(point => [Number(point[0]), Number(point[1])])
          );
          if (latLngBounds.isValid()) {
            map.flyToBounds(latLngBounds, {
              padding: [48, 48],
              maxZoom: 20,
              duration: 0.45,
            });
            return;
          }
        }

        map.flyTo(getBuildingCenter(building), 19, {
          duration: 0.45,
        });
      }

      function formatMeters(distance) {

      function formatMinutes(minutes) {

      function normalizeSearchText(text) {
        return String(text || '').toLowerCase().replace(/\s+/g, '');
      }

      function parseFloorHint(query) {
        const q = String(query || '').toLowerCase();
        if (!q.trim()) return null;
        if (/(b1|地下一樓|負一樓)/.test(q)) return -1;
        const explicit = q.match(/(-?\d+)\s*(?:f|樓)/);
        if (explicit) return parseInt(explicit[1], 10);
        const zhMap = { 一: 1, 二: 2, 三: 3, 四: 4, 五: 5 };
        for (const [label, value] of Object.entries(zhMap)) {
          if (q.includes(`${label}樓`) || q.includes(`${label}f`)) return value;
        }
        return null;
      }

      function isOutdoorNode(node) {
        return !!node?.isOutdoor;
      }

      function isAccessibleNode(node) {
        return node?.type !== 'staircase';
      }

      function isSearchableNode(node) {
        return !!node && (node.isPOI || ['entrance', 'elevator', 'staircase'].includes(node.type));
      }

      // === POI 詳細資料 ===

      function getPoiMeta(node) {
        if (!node) return {};
        const fallback = poiDescriptions[getNodeBaseId(node)] || poiDescriptions[node.id] || {};
        return {
          ...fallback,
          ...(node.desc ? { desc: node.desc } : {}),
          ...(node.hours ? { hours: node.hours } : {}),
          ...(Array.isArray(node.aliases) && node.aliases.length ? { aliases: node.aliases } : {}),
          ...(Array.isArray(node.keywords) && node.keywords.length ? { keywords: node.keywords } : {}),
        };
      }

      function getSearchKeywords(node) {
        const meta = getPoiMeta(node);
        return [
          node.name,
          typeNameMap[node.type] || node.type,
          getBuildingName(node),
          getNodeDisplayLabel(node),
          !node.isOutdoor ? formatFloorNarration(getNodeDisplayFloor(node)) : '戶外',
          meta.desc,
          ...(meta.aliases || []),
          ...(meta.keywords || []),
        ].filter(Boolean);
      }

      function searchNodes(query, { excludeIds = [], includeNonPoi = false, limit = 12 } = {}) {
        const q = String(query || '').trim();
        if (!q) return [];
        const normalizedQuery = normalizeSearchText(q);
        const tokens = q.toLowerCase().split(/\s+/).filter(Boolean);
        const floorHint = parseFloorHint(q);

        return nodes
          .filter(node => (includeNonPoi ? isSearchableNode(node) : node.isPOI))
          .filter(node => !excludeIds.includes(node.id))
          .map(node => {
            const meta = getPoiMeta(node);
            const keywords = getSearchKeywords(node);
            const normalizedKeywords = keywords.map(normalizeSearchText);
            let score = 0;
            let reason = `${getNodeDisplayLabel(node)} · ${typeNameMap[node.type] || node.type}`;

            if (floorHint !== null && getNodeDisplayFloor(node) !== floorHint) return null;

            if (normalizeSearchText(node.name) === normalizedQuery) score += 120;
            else if (normalizeSearchText(node.name).includes(normalizedQuery)) score += 70;

            normalizedKeywords.forEach((keyword, index) => {
              if (!keyword) return;
              if (keyword === normalizedQuery) score += index <= 1 ? 80 : 40;
              else if (keyword.includes(normalizedQuery)) score += index <= 1 ? 45 : 18;
            });

            const tokenMatches = tokens.filter(token => normalizedKeywords.some(keyword => keyword.includes(normalizeSearchText(token))));
            score += tokenMatches.length * 14;
            if (meta.aliases?.some(alias => normalizeSearchText(alias).includes(normalizedQuery))) {
              reason = `別名：${meta.aliases.find(alias => normalizeSearchText(alias).includes(normalizedQuery))}`;
            } else if (meta.keywords?.some(keyword => normalizeSearchText(keyword).includes(normalizedQuery))) {
              reason = `關鍵詞：${meta.keywords.find(keyword => normalizeSearchText(keyword).includes(normalizedQuery))}`;
            } else if (floorHint !== null) {
              reason = `${node.isOutdoor ? '戶外' : formatFloorNarration(getNodeDisplayFloor(node))} · ${typeNameMap[node.type] || node.type}`;
            }

            return score > 0 ? { node, score, reason } : null;
          })
          .filter(Boolean)
          .sort((a, b) => b.score - a.score || getNodeDisplayFloor(a.node) - getNodeDisplayFloor(b.node) || a.node.name.localeCompare(b.node.name, 'zh-Hant'))
          .slice(0, limit);
      }

      function renderSearchResults(items, selectHandlerName, emptyText, headerText = '') {
        const box = document.getElementById('search-results');
        if (!items.length) {
          box.innerHTML = `<p class="px-4 py-3 text-sm text-slate">${emptyText}</p>`;
          box.style.display = 'block';
          return;
        }

        const header = headerText ? `<p class="px-4 pt-3 pb-1 text-xs text-slate font-bold">${headerText}</p>` : '';
        box.innerHTML = header + items.map(({ node, reason }) => `
          <button onclick="${selectHandlerName}('${node.id}')" class="w-full text-left flex items-center gap-3 px-4 py-3 hover:bg-bg transition-colors border-b border-border/30 last:border-0">
            <div class="w-8 h-8 rounded-full ${['elevator','staircase'].includes(node.type) ? 'bg-yellow/20 text-yellow' : node.type === 'parking' ? 'bg-blue-100 text-blue-500' : 'bg-sage/10 text-sage'} flex items-center justify-center text-xs shrink-0">
              <i class="fa-solid ${typeIcons[node.type] || 'fa-location-dot'}"></i>
            </div>
            <div class="min-w-0">
              <p class="text-dark font-medium text-sm truncate">${node.name}</p>
              <p class="text-slate text-xs truncate">${reason}</p>
            </div>
          </button>
        `).join('');
        box.style.display = 'block';
      }

      function getLifeSuggestionOrigin() {
        return startNode || selectedNode || getDefaultLocationNode();
      }

      function buildNearestWcSuggestion(origin) {
        if (!origin) return null;
        const best = nodes
          .filter(node => node.isPOI && node.type === 'wc' && node.id !== origin.id)
          .map(node => {
            const route = findShortestPath(origin.id, node.id, { outdoorPenalty: userPreferences.indoorPreferred ? 120 : 40 });
            if (!route?.path?.length) return null;
            const summary = summarizeRoute(route);
            return {
              node,
              route,
              summary,
              sameFloor: node.floor === origin.floor ? 1 : 0,
              sameBuilding: node.building && node.building === origin.building ? 1 : 0,
            };
          })
          .filter(Boolean)
          .sort((a, b) =>
            b.sameFloor - a.sameFloor
            || b.sameBuilding - a.sameBuilding
            || a.summary.outdoorDistance - b.summary.outdoorDistance
            || a.route.actualDistance - b.route.actualDistance
          )[0];

        if (!best) return null;

        const contextText = best.sameFloor
          ? '同樓層最近的洗手間'
          : best.sameBuilding
            ? '同棟最近的洗手間'
            : '目前可達的最近洗手間';

        return {
          id: 'nearest-wc',
          icon: 'fa-restroom',
          title: '找最近洗手間',
          desc: `${contextText}是「${best.node.name}」，${formatMeters(best.route.actualDistance)}，${best.summary.outdoorDistance > 8 ? '可優先少走戶外' : '動線最短'}。`,
          accent: 'text-sage',
          target: best.node,
          preferredRouteKey: best.summary.outdoorDistance > 8 ? 'indoor' : 'shortest',
        };
      }

      function buildRainyDaySuggestion(origin) {
        if (!origin) return null;
        const best = nodes
          .filter(node => node.isPOI && node.id !== origin.id && !isOutdoorNode(node) && node.type !== 'parking')
          .map(node => {
            const indoorRoute = findShortestPath(origin.id, node.id, { outdoorPenalty: 220 });
            const shortestRoute = findShortestPath(origin.id, node.id, {});
            if (!indoorRoute?.path?.length || !shortestRoute?.path?.length) return null;
            const indoorSummary = summarizeRoute(indoorRoute);
            const shortestSummary = summarizeRoute(shortestRoute);
            if (indoorSummary.outdoorDistance > 12) return null;
            return { node, route: indoorRoute, indoorSummary, shortestSummary };
          })
          .filter(Boolean)
          .sort((a, b) =>
            a.indoorSummary.outdoorDistance - b.indoorSummary.outdoorDistance
            || a.route.actualDistance - b.route.actualDistance
          )[0];

        if (!best) return null;

        const fullyIndoor = best.indoorSummary.outdoorDistance <= 2;
        return {
          id: 'rainy-day',
          icon: 'fa-cloud-rain',
          title: fullyIndoor ? '雨天全室內' : '雨天少淋雨',
          desc: `從「${origin.name}」前往「${best.node.name}」${fullyIndoor ? '可全程待在室內' : `戶外只需 ${formatMeters(best.indoorSummary.outdoorDistance)}`}。`,
          accent: 'text-slate',
          target: best.node,
          preferredRouteKey: 'indoor',
        };
      }

      function buildScenicSuggestion(origin) {
        if (!origin) return null;
        const best = nodes
          .filter(node => node.isPOI && node.id !== origin.id && !['wc', 'elevator'].includes(node.type))
          .map(node => {
            const scenicRoute = findShortestPath(origin.id, node.id, { indoorPenalty: 18 });
            const shortestRoute = findShortestPath(origin.id, node.id, {});
            if (!scenicRoute?.path?.length || !shortestRoute?.path?.length) return null;
            const scenicSummary = summarizeRoute(scenicRoute);
            const shortestSummary = summarizeRoute(shortestRoute);
            if (scenicSummary.outdoorDistance < 20) return null;
            if (scenicSummary.outdoorDistance <= shortestSummary.outdoorDistance + 12) return null;
            if (scenicRoute.actualDistance > shortestRoute.actualDistance * 1.8) return null;
            const keywords = getSearchKeywords(node).join(' ');
            const scenicBoost = /中庭|戶外|停車|散步|廣場/.test(keywords) ? 35 : 0;
            const score = scenicBoost + scenicSummary.outdoorDistance - scenicRoute.actualDistance * 0.08;
            return { node, route: scenicRoute, scenicSummary, score };
          })
          .filter(Boolean)
          .sort((a, b) => b.score - a.score)[0];

        if (!best) return null;

        const scenicKeywords = getSearchKeywords(best.node).join(' ');
        const title = /中庭/.test(scenicKeywords) ? '中庭散步模式' : '戶外散步模式';
        return {
          id: 'scenic-break',
          icon: 'fa-seedling',
          title,
          desc: `帶你走到「${best.node.name}」，戶外段約 ${formatMeters(best.scenicSummary.outdoorDistance)}，適合想繞出去透透氣。`,
          accent: 'text-yellow',
          target: best.node,
          preferredRouteKey: 'scenic',
        };
      }

      function buildSurpriseSuggestion(origin) {
        if (!origin) return null;
        const pool = nodes
          .filter(node => node.isPOI && node.id !== origin.id && !['wc', 'elevator'].includes(node.type))
          .map(node => {
            const route = findShortestPath(origin.id, node.id, {});
            if (!route?.path?.length) return null;
            const summary = summarizeRoute(route);
            if (route.actualDistance < 20 || route.actualDistance > 420) return null;
            const keywords = getSearchKeywords(node).join(' ');
            const interestingBoost = /中庭|停車|入口|教室|辦公室|戶外/.test(keywords) ? 20 : 0;
            return { node, route, summary, score: interestingBoost - Math.abs(route.actualDistance - 150) * 0.04 };
          })
          .filter(Boolean)
          .sort((a, b) => b.score - a.score)
          .slice(0, 6);

        if (!pool.length) return null;
        const picked = pool[Math.floor(Math.random() * pool.length)];
        return {
          id: 'surprise-me',
          icon: 'fa-dice',
          title: '隨機探索',
          desc: `這次帶你去「${picked.node.name}」，${formatMeters(picked.route.actualDistance)}，適合臨時想換個地方走走。`,
          accent: 'text-slate',
          target: picked.node,
          preferredRouteKey: picked.summary.outdoorDistance > 24 ? 'scenic' : 'shortest',
        };
      }

        const origin = getLifeSuggestionOrigin();
        if (!origin) return [];
        const suggestions = [
          buildNearestWcSuggestion(origin),
          buildRainyDaySuggestion(origin),
          buildScenicSuggestion(origin),
          buildSurpriseSuggestion(origin),
        ].filter(Boolean);
        currentLifeSuggestions = Object.fromEntries(suggestions.map(suggestion => [suggestion.id, suggestion]));
        return suggestions;

      // === 4. UI 互動與拖曳手勢 ===
      const sheet = document.getElementById("bottom-sheet");
      const dragArea = document.getElementById("drag-area");

      let _startY = 0;
      let _isDragging = false;
      let _initialY = 0; // 按下時面板的 transform Y 值

      function _getTransformY(el) {
        const m = window.getComputedStyle(el).transform.match(/matrix\((.+)\)$/);
        return m ? parseFloat(m[1].split(", ")[5]) : 0;
      }

      function _onDragStart(e) {
        e.preventDefault();
        _isDragging = true;
        _startY = e.touches ? e.touches[0].clientY : e.clientY;
        _initialY = _getTransformY(sheet);
        sheet.classList.add("dragging");
      }

      function _onDragMove(e) {
        if (!_isDragging) return;
        e.preventDefault();
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        const wh = window.innerHeight;
        let newY = _initialY + (clientY - _startY);
        newY = Math.max(wh * 0.1, Math.min(wh - 24, newY));
        sheet.style.transform = `translateY(${newY}px)`;
      }

      function _onDragEnd(e) {
        if (!_isDragging) return;
        _isDragging = false;
        sheet.classList.remove("dragging");

        // 讀取放手瞬間的位置
        const releasedY = _getTransformY(sheet);
        // 清除 inline style，讓 CSS class + transition 接管
        sheet.style.transform = "";

        // 如果幾乎沒移動（點擊，非拖曳），不切換任何狀態
        if (Math.abs(releasedY - _initialY) < 8) return;

        // 計算三個吸附點距離，吸附到最近的那個
        const wh = window.innerHeight;
        // 讀取目前的 peek 高度
        const currentPeek = parseInt(getComputedStyle(sheet).getPropertyValue('--peek-height')) || 220;
        const snaps = isSheetCloseLocked()
          ? { full: wh * 0.1, peek: wh - currentPeek }
          : { full: wh * 0.1, peek: wh - currentPeek, closed: wh - 24 };
        let nearest = "peek", minD = Infinity;
        for (const [s, y] of Object.entries(snaps)) {
          const d = Math.abs(releasedY - y);
          if (d < minD) { minD = d; nearest = s; }
        }
        sheet.className = nearest;
      }

      dragArea.addEventListener("mousedown", _onDragStart);
      document.addEventListener("mousemove", _onDragMove, { passive: false });
      document.addEventListener("mouseup", _onDragEnd);
      dragArea.addEventListener("touchstart", _onDragStart, { passive: false });
      document.addEventListener("touchmove", _onDragMove, { passive: false });
      document.addEventListener("touchend", _onDragEnd);

                  </div>

                    <div class="font-bold text-dark">${floorSummary}</div>
                    <div>建築導覽</div>
                  </div>
                </div>
                <div class="flex items-center gap-1.5 flex-wrap mt-2.5 text-[10px] text-slate">
                  <span class="px-2 py-0.5 rounded-full bg-dark/5 text-dark">點擊進入</span>
                </div>
              </button>`;
          });
          const outdoorNodes = getStandaloneOutdoorNodes();
          const cardsHtml = buildingCards.join('');
          const outdoorListHtml = outdoorNodes.length ? `
            <div class="mt-5 px-1">
              <div class="flex items-center gap-2 min-w-0 mb-2">
                <span class="text-[11px] font-bold uppercase tracking-wide text-slate">戶外地點</span>
                <span class="px-2 py-0.5 rounded-full bg-white border border-border/70 text-[10px] font-bold text-dark">共 ${outdoorNodes.length} 個</span>
              </div>
              <div class="flex flex-col gap-2">
                ${outdoorNodes.map(node => `
                  <button onclick="selectNode(nodes.find(x=>x.id==='${node.id}'), { fromBottomSheet: true })" class="w-full text-left flex items-center gap-3 p-3 rounded-xl bg-white border border-border/50 shadow-sm hover:border-sage/50 transition-all active:scale-[0.98]">
                    <div class="w-10 h-10 rounded-full ${node.type === 'parking' ? 'bg-blue-100 text-blue-500' : 'bg-sage/10 text-sage'} flex items-center justify-center shrink-0">
                      <i class="fa-solid ${typeIcons[node.type] || 'fa-location-dot'}"></i>
                    </div>
                    <div class="flex-1 min-w-0">
                      <p class="text-dark font-bold text-sm truncate">${node.name}</p>
                      <p class="text-slate text-xs mt-0.5">戶外 · ${typeNameMap[node.type] || node.type}</p>
                    </div>
                    <div class="text-border/50">
                      <i class="fa-solid fa-chevron-right text-xs"></i>
                    </div>
                  </button>`).join('')}
              </div>
            </div>` : '';
          list.innerHTML = `
            <div class="route-option-stack pb-2">
              <div class="route-option-meta px-1">
                <div class="flex items-center gap-2 min-w-0">
                  <span class="text-[11px] font-bold uppercase tracking-wide text-slate">建築選擇</span>
                  <span class="px-2 py-0.5 rounded-full bg-white border border-border/70 text-[10px] font-bold text-dark">共 ${buildings.length} 棟</span>
                </div>
                <div class="flex items-center gap-1 text-[10px] text-slate whitespace-nowrap ${buildings.length > 1 ? '' : 'hidden'}">
                  <span>左右滑動</span>
                  <i class="fa-solid fa-angles-right text-[9px]"></i>
                </div>
              </div>
              <div class="route-option-viewport">
                <div class="route-option-strip">
                  ${cardsHtml}
                </div>
              </div>
              ${outdoorListHtml}
            </div>`;
          ensureSheetVisible();
          updateSearchBarMode();
          return;
        }
        title.textContent = selectedBuilding === '__outdoor__' ? '探索戶外節點' : `探索 ${getBuildingById(selectedBuilding)?.name || '建築'}`;
        subtitle.textContent = selectedBuilding === '__outdoor__'
          ? '目前顯示戶外節點與動線'
          : '切換樓層查看節點，或從下方直接選擇地點';
        if (backButton) {
          if (selectedBuilding) {
            backButton.classList.remove('hidden');
            backButton.classList.add('inline-flex');
          } else {
            backButton.classList.add('hidden');
            backButton.classList.remove('inline-flex');
          }
        }
        if (chips) chips.style.display = '';
        renderExploreChips();
        if (highlights) highlights.style.display = '';
        // 取得所有樓層的 POI（依 activeFilter 過濾）
        const allPois = getExploreCandidates().filter(n => activeFilter === 'all' || n.type === activeFilter);
        // 依樓層分組
        const floors = [...new Set(allPois.map(n => getNodeContextFloor(n, selectedBuilding)).filter(Number.isInteger))].sort((a, b) => a - b);
        let html = '';
        floors.forEach(f => {
          const floorPois = allPois.filter(n => getNodeContextFloor(n, selectedBuilding) === f);
          html += `<p class="text-xs text-slate font-bold uppercase px-2 pt-3 pb-1 ${f === activeFloor ? 'text-sage':''}">${formatFloorLabel(f)} ${f === activeFloor ? '（目前樓層）':''}</p>`;
          floorPois.forEach(n => {
            html += `
              <button onclick="selectNode(nodes.find(x=>x.id==='${n.id}'), { fromBottomSheet: true })" class="w-full text-left flex items-center gap-3 p-3 mb-2 rounded-xl bg-white border border-border/50 shadow-sm hover:border-sage/50 transition-all active:scale-[0.98]">
                <div class="w-10 h-10 rounded-full ${['elevator','staircase'].includes(n.type)?'bg-yellow/10 text-yellow':'bg-sage/10 text-sage'} flex items-center justify-center shrink-0">
                  <i class="fa-solid ${typeIcons[n.type]||'fa-location-dot'}"></i>
                </div>
                <div class="flex-1 min-w-0">
                  <p class="text-dark font-bold text-sm truncate">${n.name}</p>
                  <p class="text-slate text-xs mt-0.5">${getNodeDisplayLabel(n)} · ${typeNameMap[n.type]||n.type}</p>
                </div>
                <div class="text-border/50">
                  <i class="fa-solid fa-chevron-right text-xs"></i>
                </div>
              </button>`;
          });
        });
        list.innerHTML = html;
        ensureSheetVisible();
        updateSearchBarMode();
      }

      function selectNode(node, options = {}) {
        if (isNavigating) return;
        const { fromBottomSheet = false } = options;
        selectedNode = node;
        const previousBuilding = selectedBuilding;
        const previousFloor = activeFloor;
        focusNodeContext(node);
        if (previousBuilding !== selectedBuilding || previousFloor !== activeFloor) {
          renderMap();
        }
        // 跨樓層自動切換
        const nextActiveFloor = getActiveNodeFloorValue(node);
        if (nextActiveFloor !== activeFloor) {
          activeFloor = nextActiveFloor;
          updateFloorButtonLabel();
          renderMap();
        }
        // 如果正在選取起點（pick-start模式）
        if (navMode === 'pick-start') {
          startNode = node;
          lastPickField = 'start';
          if (startNode.id === destinationNode?.id) {
            showToast('起點與終點相同，請重新選擇');
            return;
          }
          renderMap();
          showRouteSummary(getDefaultRouteKey());
          return;
        }
        // 如果正在選取終點（pick-end模式）
        if (navMode === 'pick-end') {
          destinationNode = node;
          lastPickField = 'end';
          if (startNode?.id === destinationNode.id) {
            showToast('起點與終點相同，請重新選擇');
            return;
          }
          renderMap();
          showRouteSummary(getDefaultRouteKey());
          return;
        }
        // 正常 POI 模式
        navMode = 'poi';
        switchSheetMode('sheet-poi');
        document.getElementById('sheet-title').innerText = node.name;
        const typeName = typeNameMap[node.type] || node.type;
        const info = getPoiMeta(node);
        document.getElementById('sheet-subtitle').innerText = `${getNodeDisplayLabel(node)} • ${typeName} • ${getBuildingName(node)}`;
        document.getElementById('poi-desc').textContent = info.desc || `${typeName}，位於${getBuildingName(node)} ${formatFloorNarration(getNodeDisplayFloor(node))}。`;
        document.getElementById('poi-hours').innerHTML = `<i class="fa-solid fa-clock mr-1"></i>${info.hours || '依校方公告'}`;
        updateFavButton();
        updateSearchBarMode();
        if (fromBottomSheet) {
          sheet.className = 'peek';
        } else {
          ensureSheetVisible();
        }
        map.flyTo(node.coordinates, 20);
      }

      // 點擊地圖空白處
      map.on('click', function() {
        if (isNavigating) return;
        if (['nav-summary','pick-start','pick-end'].includes(navMode)) return;
        showExploreMode();
      });

      function getPickBaseCandidates(excludeId) {
        return nodes.filter(node => {
          if (!node.isPOI || node.id === excludeId || (activeFilter !== 'all' && node.type !== activeFilter)) return false;
          if (node.isOutdoor) return true;
          return !!node.building;
        });
      }

      function getPickBuildingInfo(buildingId, picks) {
        if (buildingId === '__outdoor__') {
          const outdoorFloors = [...new Set(picks.map(node => getNodeDisplayFloor(node)))].sort((a, b) => a - b);
          return {
            id: '__outdoor__',
            name: '戶外區域',
            icon: 'fa-tree-city',
            poiCount: picks.length,
            floorSummary: outdoorFloors.length
              ? `${formatFloorLabel(outdoorFloors[0])} - ${formatFloorLabel(outdoorFloors[outdoorFloors.length - 1])}`
              : '戶外',
            subtitle: picks[0]?.name || '可直接切換至戶外地點',
          };
        }

        const building = getBuildingById(buildingId);
        const buildingFloors = getFloorsForBuilding(buildingId);
        const groundEntrance = picks.find(node => node.type === 'entrance' && node.isGroundLevel);
        const buildingIcon = building ? getBuildingLabelIcon(building) : 'fa-building';
        return {
          id: buildingId,
          name: building?.name || '未命名建築',
          icon: buildingIcon,
          poiCount: picks.length,
          floorSummary: buildingFloors.length
            ? `${formatFloorLabel(buildingFloors[0])} - ${formatFloorLabel(buildingFloors[buildingFloors.length - 1])}`
            : '尚無樓層資料',
          subtitle: groundEntrance?.name || picks[0]?.name || '可切換查看建築內地點',
        };
      }

      function buildPickBuildingOptions(basePicks) {
        const grouped = new Map();
        basePicks.forEach(node => {
          const buildingId = node.building || (node.isOutdoor ? '__outdoor__' : null);
          if (!buildingId) return;
          if (!grouped.has(buildingId)) grouped.set(buildingId, []);
          grouped.get(buildingId).push(node);
        });

        const currentBuildingId = selectedBuilding === '__outdoor__' ? '__outdoor__' : selectedBuilding;
        return [...grouped.entries()]
          .map(([buildingId, picks]) => getPickBuildingInfo(buildingId, picks))
          .sort((a, b) => {
            if (a.id === currentBuildingId) return -1;
            if (b.id === currentBuildingId) return 1;
            if (a.id === '__outdoor__') return 1;
            if (b.id === '__outdoor__') return -1;
            return a.name.localeCompare(b.name, 'zh-Hant');
          });
      }

      function renderPickBuildingSwitcher(mode, buildingOptions) {
        const container = document.getElementById('pick-building-switcher');
        if (!container) return;
        if (!buildingOptions.length) {
          container.innerHTML = '';
          container.style.display = 'none';
          return;
        }

        container.style.display = '';
        const currentBuildingName = buildingOptions.find(option => option.id === pickListBuildingId)?.name || '未指定';
        const cardsHtml = buildingOptions.map(option => {
          const isActive = option.id === pickListBuildingId;
          return `
            <button onclick="selectPickBuilding('${mode}', '${option.id}')" class="route-option-card building-option-card ${isActive ? 'active' : ''} shrink-0 text-left rounded-2xl border border-border/60 bg-white px-3.5 py-3 shadow-sm">
              <div class="flex items-start justify-between gap-3">
                <div class="min-w-0 flex-1">
                  <div class="flex items-center gap-2 min-w-0">
                    <i class="fa-solid ${option.icon} text-sage text-sm shrink-0"></i>
                    <p class="text-sm font-bold text-dark truncate">${option.name}</p>
                  </div>
