                  <div class="flex items-center gap-1.5 flex-wrap mt-2 text-[10px]">
                    <span class="px-2 py-0.5 rounded-full bg-sage/15 text-sage">${option.poiCount} 個地點</span>
                  </div>
                  <p class="text-[11px] text-slate mt-1.5 leading-snug line-clamp-2">${option.subtitle}</p>
                </div>
                <div class="text-[11px] text-slate text-right shrink-0 leading-tight">
                  <div class="font-bold text-dark">${option.floorSummary}</div>
                  <div>${isActive ? '目前顯示' : '切換查看'}</div>
                </div>
              </div>
            </button>`;
        }).join('');

        container.innerHTML = `
          <div class="route-option-stack mb-0">
            <div class="route-option-meta px-1">
              <div class="flex items-center gap-2 min-w-0">
                <span class="text-[11px] font-bold uppercase tracking-wide text-slate">其他建築</span>
                <span class="px-2 py-0.5 rounded-full bg-white border border-border/70 text-[10px] font-bold text-dark">目前：${currentBuildingName}</span>
              </div>
              <div class="flex items-center gap-1 text-[10px] text-slate whitespace-nowrap ${buildingOptions.length > 1 ? '' : 'hidden'}">
                <span>左右滑動</span>
                <i class="fa-solid fa-angles-right text-[9px]"></i>
              </div>
            </div>
            <div class="route-option-viewport">
              <div class="route-option-strip">
                ${cardsHtml}
              </div>
            </div>
          </div>`;
      }

      function selectPickBuilding(mode, buildingId) {
        pickListBuildingId = buildingId;
        renderPickList(mode, buildingId);
      }

      function renderPickList(mode, preferredBuildingId = null) {
        navMode = mode === 'start' ? 'pick-start' : 'pick-end';
        const excludeId = mode === 'start' ? destinationNode?.id : startNode?.id;
        const basePicks = getPickBaseCandidates(excludeId);
        const buildingOptions = buildPickBuildingOptions(basePicks);
        const validBuildingIds = new Set(buildingOptions.map(option => option.id));
        const currentBuildingId = selectedBuilding === '__outdoor__' ? '__outdoor__' : selectedBuilding;
        const fallbackBuildingId = (currentBuildingId && validBuildingIds.has(currentBuildingId) && currentBuildingId)
          || (pickListBuildingId && validBuildingIds.has(pickListBuildingId) && pickListBuildingId)
          || buildingOptions[0]?.id
          || null;

        pickListBuildingId = preferredBuildingId && validBuildingIds.has(preferredBuildingId)
          ? preferredBuildingId
          : fallbackBuildingId;

        const picks = basePicks.filter(node => {
          if (!pickListBuildingId) return true;
          if (pickListBuildingId === '__outdoor__') return !!node.isOutdoor;
          return isNodeInBuildingContext(node, pickListBuildingId);
        });

        document.getElementById('pick-title').textContent = mode === 'start' ? '選擇起點' : '選擇終點';
        document.getElementById('pick-subtitle').textContent = mode === 'start'
          ? '請先選擇你目前所在的位置，才能開始規劃路線'
          : `起點已設為「${startNode?.name || '未設定'}」，請選擇目的地`;
        document.getElementById('pick-location-btn').style.display = mode === 'start' ? '' : 'none';
        renderPickBuildingSwitcher(mode, buildingOptions);

        const floors = [...new Set(picks.map(n => getNodeContextFloor(n, pickListBuildingId)).filter(Number.isInteger))].sort((a, b) => a - b);
        let html = '';
        if (!picks.length) {
          html = '<div class="px-3 py-6 text-sm text-slate">這個建築目前沒有可選的地點。</div>';
        }
        floors.forEach(floor => {
          const floorPois = picks.filter(n => getNodeContextFloor(n, pickListBuildingId) === floor);
          const isCurrentFloor = pickListBuildingId === currentBuildingId && floor === activeFloor;
          html += `<p class="text-xs text-slate font-bold uppercase px-2 pt-3 pb-1 ${isCurrentFloor ? 'text-sage':''}">${formatFloorLabel(floor)} ${isCurrentFloor ? '（目前樓層）':''}</p>`;
          floorPois.forEach(n => {
            html += `
              <button onclick="selectNode(nodes.find(x=>x.id==='${n.id}'))" class="w-full text-left flex items-center gap-3 p-3 mb-2 rounded-xl bg-white border border-border/50 shadow-sm hover:border-sage/50 transition-all active:scale-[0.98]">
                <div class="w-10 h-10 rounded-full ${['elevator','staircase'].includes(n.type)?'bg-yellow/10 text-yellow':n.type === 'parking' ? 'bg-blue-100 text-blue-500' : 'bg-sage/10 text-sage'} flex items-center justify-center shrink-0">
                  <i class="fa-solid ${typeIcons[n.type]||'fa-location-dot'}"></i>
                </div>
                <div class="flex-1 min-w-0">
                  <p class="text-dark font-bold text-sm truncate">${n.name}</p>
                  <p class="text-slate text-xs mt-0.5">${getNodeDisplayLabel(n)} · ${typeNameMap[n.type]||n.type} · ${getBuildingName(n)}</p>
                </div>
                <div class="text-border/50">
                  <i class="fa-solid fa-chevron-right text-xs"></i>
                </div>
              </button>`;
          });
        });

        document.getElementById('pick-list').innerHTML = html;
        switchSheetMode('sheet-pick');
        updateSearchBarMode();
        ensureSheetVisible();

        // Zoom out to show campus when first entering pick mode, then render
        if (!preferredBuildingId && buildings.length >= 1) {
          const allCenters = buildings.map(b => getBuildingCenter(b));
          const bounds = L.latLngBounds(allCenters);
          if (bounds.isValid()) {
            map.fitBounds(bounds, { padding: [60, 60], maxZoom: 18, animate: false });
          }
        }
        renderMap();
      }

      function setAsStart() {
        startNode = selectedNode;
        lastPickField = 'start';
        showToast(`✓ 已設定起點：${startNode.name}`);
        destinationNode = null;
        renderMap();
        renderPickList('end');
      }

      // --- 導航兩階段流程 ---

      // 階段 1: 點「規劃路線」→ 檢查是否有起點
      function planRoute() {
        destinationNode = selectedNode;
        lastPickField = 'end';

        if (!startNode) {
          renderPickList('start');
          return;
        }

        if (startNode.id === destinationNode.id) {
          showToast('起點與終點相同，請重新選擇');
          return;
        }
        showRouteSummary(getDefaultRouteKey());
      }

      // 使用目前定位作為起點
      function useMyLocationAsStart() {
        requestCurrentLocation({ centerMap: true }).then((resolvedNode) => {
          startNode = resolvedNode || getDefaultLocationNode();
          if (!startNode) return;
          lastPickField = 'start';
          renderMap();
          if (destinationNode) {
            showRouteSummary(getDefaultRouteKey());
          } else {
            showToast(`✓ 已將目前定位設為起點：${startNode.name}`);
            renderPickList('end');
          }
        });
      }

      // --- 時間軸渲染邏輯 ---
      function getSelectedRouteResult() {
        if (routeOptions.length) {
          return routeOptions.find(route => route.key === selectedRouteKey) || routeOptions[0];
        }
        return cachedRouteResult;
      }

      function renderRouteOptions() {
        const container = document.getElementById('route-options');
        if (!container) return;
        if (!routeOptions.length) {
          container.innerHTML = '';
          return;
        }

        const selectedIndex = Math.max(0, routeOptions.findIndex(route => route.key === selectedRouteKey));
        const hasMultiple = routeOptions.length > 1;
        container.className = 'route-option-stack';

        const cardsHtml = routeOptions.map(route => {
          const isActive = route.key === selectedRouteKey;
          const outdoorShare = route.actualDistance > 0 ? Math.round((route.outdoorDistance / route.actualDistance) * 100) : 0;
          const strategyBadges = getRouteStrategyBadges(route);
          return `
            <button onclick="selectRouteOption('${route.key}')" data-route-key="${route.key}" class="route-option-card compact ${isActive ? 'active' : ''} shrink-0 text-left rounded-2xl border border-border/60 bg-white px-3.5 py-3 shadow-sm">
              <div class="flex items-start justify-between gap-3">
                <div class="min-w-0 flex-1">
                  <div class="flex items-center gap-2 min-w-0">
                    <i class="fa-solid ${route.icon} text-sage text-sm shrink-0"></i>
                    <p class="text-sm font-bold text-dark truncate">${route.label}</p>
                  </div>
                  <div class="flex items-center gap-1.5 flex-wrap mt-2 text-[10px]">
                    ${strategyBadges.slice(0, 2).map(badge => `<span class="px-2 py-0.5 rounded-full ${badge.className}">${badge.text}</span>`).join('')}
                  </div>
                  <p class="text-[11px] text-slate mt-1.5 leading-snug line-clamp-2">${route.description}</p>
                </div>
                <div class="text-[11px] text-slate text-right shrink-0 leading-tight">
                  <div class="font-bold text-dark">${formatMinutes(route.estimatedMinutes)}</div>
                  <div>${formatMeters(route.actualDistance)}</div>
                </div>
              </div>
              <div class="flex items-center gap-1.5 flex-wrap mt-2.5 text-[10px] text-slate">
                <span class="px-2 py-0.5 rounded-full bg-slate/10 text-slate">戶外 ${outdoorShare}%</span>
                ${route.key === 'indoor' ? '<span class="px-2 py-0.5 rounded-full bg-dark/5 text-dark">雨天</span>' : ''}
              </div>
            </button>
          `;
        }).join('');

        container.innerHTML = `
          <div class="route-option-meta px-1">
            <div class="flex items-center gap-2 min-w-0">
              <span class="text-[11px] font-bold uppercase tracking-wide text-slate">路線方案</span>
              <span class="px-2 py-0.5 rounded-full bg-white border border-border/70 text-[10px] font-bold text-dark">共 ${routeOptions.length} 個</span>
              <span id="route-option-position" class="text-[10px] text-slate whitespace-nowrap">${selectedIndex + 1} / ${routeOptions.length}</span>
            </div>
            <div class="flex items-center gap-1 text-[10px] text-slate whitespace-nowrap ${hasMultiple ? '' : 'hidden'}">
              <span>左右滑動</span>
              <i class="fa-solid fa-angles-right text-[9px]"></i>
            </div>
          </div>
          <div class="route-option-viewport">
            <div class="route-option-strip">
              ${cardsHtml}
            </div>
          </div>
        `;
      }

      function updateRouteOptionSelectionUI() {
        const container = document.getElementById('route-options');
        if (!container) return;

        container.querySelectorAll('[data-route-key]').forEach((button) => {
          button.classList.toggle('active', button.dataset.routeKey === selectedRouteKey);
        });

        const position = container.querySelector('#route-option-position');
        if (position && routeOptions.length) {
          const selectedIndex = Math.max(0, routeOptions.findIndex(route => route.key === selectedRouteKey));
          position.textContent = `${selectedIndex + 1} / ${routeOptions.length}`;
        }
      }

      function renderActiveRouteMeta() {
        const container = document.getElementById('nav-active-meta');
        if (!container) return;
        const result = getSelectedRouteResult();
        if (!result) {
          container.innerHTML = '';
          return;
        }
        const strategyBadges = getRouteStrategyBadges(result).slice(0, 2);
        container.innerHTML = `
          <div class="route-active-card-shell">
            <div class="flex items-start justify-between gap-3">
              <div class="min-w-0 flex-1">
                <div class="flex items-center gap-2 min-w-0">
                  <div class="w-9 h-9 rounded-2xl bg-sage/12 text-sage flex items-center justify-center shrink-0">
                    <i class="fa-solid ${result.icon}"></i>
                  </div>
                  <div class="min-w-0">
                    <p class="text-[15px] font-bold text-dark truncate">${result.label}</p>
                    <p class="text-[11px] text-slate mt-0.5 truncate">${result.description}</p>
                  </div>
                </div>
                <div class="flex items-center gap-2 flex-wrap mt-3 text-[11px]">
                  <span class="route-active-chip"><i class="fa-solid fa-person-walking text-sage"></i>${formatMeters(result.actualDistance)}</span>
                  <span class="route-active-chip"><i class="fa-solid fa-clock text-slate"></i>${formatMinutes(result.estimatedMinutes)}</span>
                  ${strategyBadges.map(badge => `<span class="px-2.5 py-1 rounded-full text-[10px] font-bold ${badge.className}">${badge.text}</span>`).join('')}
                </div>
              </div>
            </div>
          </div>
        `;
      }

      function buildRouteTimelineSteps(result) {
        if (!result?.path?.length || !result?.steps?.length) return [];

        const pathNodes = result.path;
        const steps = [];
        let transitionIndex = 0;
        let walkAccumulator = {
          floor: getActiveNodeFloorValue(pathNodes[0]),
          isOutdoor: isOutdoorNode(pathNodes[0]),
          distance: 0,
          nextTransitionIndex: 0,
          routeStepStartIndex: null,
          routeStepEndIndex: null,
        };

        result.steps.forEach((stepMeta, index) => {
          const fromNode = pathNodes[index];
          const toNode = pathNodes[index + 1];

          if (stepMeta.descriptor) {
            if (walkAccumulator.distance > 0) {
              steps.push({
                type: 'walk',
                floor: walkAccumulator.floor,
                isOutdoor: walkAccumulator.isOutdoor,
                distance: walkAccumulator.distance,
                nextTransitionIndex: walkAccumulator.nextTransitionIndex,
                routeStepStartIndex: walkAccumulator.routeStepStartIndex,
                routeStepEndIndex: walkAccumulator.routeStepEndIndex,
              });
            }

            steps.push({
              type: 'transition',
              descriptor: stepMeta.descriptor,
              fromNode,
              toNode,
              transitionIndex,
              routeStepIndex: index,
              routeStepStartIndex: index,
              routeStepEndIndex: index,
            });

            transitionIndex += 1;
            walkAccumulator = {
              floor: getActiveNodeFloorValue(toNode),
              isOutdoor: isOutdoorNode(toNode),
              distance: 0,
              nextTransitionIndex: transitionIndex,
              routeStepStartIndex: null,
              routeStepEndIndex: null,
            };
          } else {
            walkAccumulator.distance += stepMeta.actualDistance || 0;
            if (walkAccumulator.routeStepStartIndex === null) {
              walkAccumulator.routeStepStartIndex = index;
            }
            walkAccumulator.routeStepEndIndex = index;
            walkAccumulator.floor = getActiveNodeFloorValue(toNode);
            walkAccumulator.isOutdoor = stepMeta.isOutdoor ?? isOutdoorNode(toNode);
          }
        });

        if (walkAccumulator.distance > 0 || steps.length === 0) {
          steps.push({
            type: 'walk',
            floor: walkAccumulator.floor,
            isOutdoor: walkAccumulator.isOutdoor,
            distance: walkAccumulator.distance,
            nextTransitionIndex: walkAccumulator.nextTransitionIndex,
            routeStepStartIndex: walkAccumulator.routeStepStartIndex ?? Math.max(0, result.steps.length - 1),
            routeStepEndIndex: walkAccumulator.routeStepEndIndex ?? Math.max(0, result.steps.length - 1),
          });
        }

        return steps.map((step, index) => ({
          ...step,
          timelineIndex: index,
        }));
      }

      function getCurrentRouteTimelineState(result = getSelectedRouteResult()) {
        const steps = buildRouteTimelineSteps(result);
        if (!steps.length) {
          return { steps, currentStep: null, currentStepIndex: -1 };
        }

        if (navMode !== 'nav-active') {
          return { steps, currentStep: null, currentStepIndex: -1 };
        }

        const transitionProgress = getClampedTransitionProgress(result);
        const walkStep = steps.find((step) =>
          step.type === 'walk'
          && step.nextTransitionIndex === transitionProgress
          && step.floor === activeFloor
        );

        const transitionStep = steps.find((step) =>
          step.type === 'transition'
          && step.transitionIndex === Math.max(0, Math.min(transitionProgress, getRouteTransitions(result).length - 1))
          && (getActiveNodeFloorValue(step.fromNode) === activeFloor || getActiveNodeFloorValue(step.toNode) === activeFloor)
        );

        const currentStep = walkStep || transitionStep || steps[steps.length - 1];
        return {
          steps,
          currentStep,
          currentStepIndex: steps.findIndex((step) => step.timelineIndex === currentStep.timelineIndex),
        };
      }

      function getClampedTransitionProgress(result = getSelectedRouteResult()) {
        const transitionCount = getRouteTransitions(result).length;
        return Math.max(0, Math.min(activeRouteTransitionIndex, transitionCount));
      }

      function selectRouteOption(routeKey) {
        selectedRouteKey = routeKey;
        lastRouteFocusKey = '';
        cachedRouteResult = getSelectedRouteResult();
        activeRouteTransitionIndex = getClampedTransitionProgress(cachedRouteResult);
        updateRouteOptionSelectionUI();
        if (navMode === 'nav-summary') {
          renderRouteTimeline('nav-steps-container');
        }
        if (navMode === 'nav-active') {
          renderActiveRouteMeta();
          renderRouteTimeline('nav-active-steps-container');
        }
        renderMap();
        drawRoute(startNode, destinationNode);
      }

      function updateRouteStatsBar(containerId) {
        const statsId = containerId === 'nav-active-steps-container' ? 'route-stats-active' : 'route-stats-summary';
        const statsEl = document.getElementById(statsId);
        if (!statsEl) return;

        const result = getSelectedRouteResult();
        if (!result) { statsEl.innerHTML = ''; return; }

        const { steps, currentStepIndex } = getCurrentRouteTimelineState(result);
        const isActive = navMode === 'nav-active' && containerId === 'nav-active-steps-container';

        let remainingDistance = result.actualDistance;
        let remainingMinutes = result.estimatedMinutes;

        if (isActive && currentStepIndex >= 0 && steps.length > 0) {
          const currentTimelineStep = steps[currentStepIndex];
          const rawCutoff = currentTimelineStep.routeStepStartIndex || 0;
          let completedDistance = 0;
          for (let i = 0; i < rawCutoff; i++) {
            completedDistance += result.steps[i]?.actualDistance || 0;
          }
          remainingDistance = Math.max(0, result.actualDistance - completedDistance);
          remainingMinutes = result.actualDistance > 0
            ? result.estimatedMinutes * (remainingDistance / result.actualDistance)
            : 0;
        }

        const label = isActive ? '剩餘' : '預估';
        statsEl.innerHTML = `
          <div class="flex items-center gap-4 text-sm font-bold text-dark">
            <span><i class="fa-solid fa-person-walking text-sage mr-1"></i> ${formatMeters(remainingDistance)}</span>
            <span><i class="fa-solid fa-clock text-slate mr-1"></i> ${formatMinutes(remainingMinutes)}</span>
            <span class="text-[11px] text-slate font-normal ml-auto">${label}</span>
          </div>
        `;
      }

      function renderRouteTimeline(containerId) {
        const stepsContainer = document.getElementById(containerId);
        attachRouteStepScrollGuard(containerId);
        const result = getSelectedRouteResult();
        if (result && result.path && result.path.length > 0) {
          cachedRouteResult = result;
          const { steps, currentStepIndex } = getCurrentRouteTimelineState(result);
          const isActiveTimeline = containerId === 'nav-active-steps-container' && navMode === 'nav-active';

          // Update sticky stats bar
          updateRouteStatsBar(containerId);

          let html = '';

          // 時間軸起點
          html += `
            <div class="flex items-start gap-3 mb-1">
              <div class="flex flex-col items-center gap-1 mt-1 shrink-0">
                <div class="w-3 h-3 rounded-full bg-sage border-[3px] border-sage/30"></div>
                <div class="w-0.5 h-6 bg-border/80 rounded-full"></div>
              </div>
              <div class="flex-1">
                <p class="text-sm text-dark font-bold">${startNode.name}</p>
              </div>
            </div>
          `;

          // 中間步驟
          steps.forEach((step, index) => {
            if (step.type === 'walk') {
              const isCurrentStep = isActiveTimeline && index === currentStepIndex;
              const isCompletedStep = isActiveTimeline && currentStepIndex !== -1 && index < currentStepIndex;
              html += `
                <div class="route-step-item flex items-start gap-3 mb-1" data-route-step-index="${index}" data-current-step="${isCurrentStep ? 'true' : 'false'}">
                  <div class="flex flex-col items-center gap-1 shrink-0">
                    <div class="w-3 h-3 rounded-full bg-transparent border-2 border-slate/30"></div>
                    <div class="w-0.5 h-6 bg-border/80 rounded-full"></div>
                  </div>
                  <div class="flex flex-1 items-center gap-2 text-sm mt-[-2px] ${isCurrentStep ? 'text-dark bg-sage/10 rounded-lg px-3 py-2 border border-sage/20' : isCompletedStep ? 'text-slate/60' : 'text-slate'}">
                    <i class="fa-solid ${step.isOutdoor ? 'fa-tree-city' : 'fa-person-walking'} w-4 text-center"></i>
                    <span>${step.isOutdoor ? '戶外步行' : `${formatFloorLabel(step.floor)} 室內步行`} ${Math.max(1, Math.round(step.distance))} 公尺</span>
                    ${isCurrentStep ? '<span class="ml-auto px-2 py-0.5 rounded-full bg-sage text-white text-[10px] font-bold">目前</span>' : isCompletedStep ? '<i class="fa-solid fa-check ml-auto text-xs text-sage"></i>' : ''}
                  </div>
                </div>
              `;
            } else if (step.type === 'transition') {
              const descriptor = step.descriptor;
              const isCurrentStep = isActiveTimeline && index === currentStepIndex;
              const isCompletedStep = isActiveTimeline && currentStepIndex !== -1 && index < currentStepIndex;
              const targetLabel = descriptor.kind === 'enter' || descriptor.kind === 'exit'
                ? `${descriptor.shortName}`
                : `${descriptor.actionLabel} 至 ${getTransitionTargetLabel(descriptor, descriptor.targetFloor, step.toNode)}`;
              html += `
                <div class="route-step-item flex items-start gap-3 mb-1" data-route-step-index="${index}" data-current-step="${isCurrentStep ? 'true' : 'false'}">
                  <div class="flex flex-col items-center gap-1 shrink-0">
                    <div class="w-3 h-3 rounded-full bg-transparent border-2 border-slate/30"></div>
                    <div class="w-0.5 h-6 border-l-2 border-dashed border-border/80"></div>
                  </div>
                  <div class="flex-1 flex items-center gap-2 text-sm ${descriptor.accentClass} ${isCurrentStep ? 'bg-sage/10 border border-sage/20 shadow-sm' : isCompletedStep ? 'bg-slate/5 opacity-75' : 'bg-slate/5'} px-3 py-1.5 rounded-lg mt-[-6px]">
                    <i class="fa-solid ${descriptor.iconClass} w-5 text-center"></i>
                    <span>${targetLabel}</span>
                    ${isCurrentStep ? '<span class="ml-auto px-2 py-0.5 rounded-full bg-sage text-white text-[10px] font-bold">目前</span>' : isCompletedStep ? '<i class="fa-solid fa-check ml-auto text-xs text-sage"></i>' : ''}
                  </div>
                </div>
              `;
            }
          });

          // 時間軸終點
          html += `
            <div class="flex items-start gap-3 mb-2">
              <div class="flex flex-col items-center shrink-0 mt-1">
                <div class="w-3 h-3 rounded-full bg-blue-500 border-[3px] border-blue-500/30"></div>
              </div>
              <div class="flex-1">
                <p class="text-sm text-dark font-bold">${destinationNode.name}</p>
              </div>
            </div>
          `;
          
          stepsContainer.innerHTML = html;
          stepsContainer.classList.remove('hidden');
          syncCurrentRouteStepIntoView(containerId, isActiveTimeline);
        } else {
          stepsContainer.innerHTML = '';
          stepsContainer.classList.add('hidden');
        }
      }

      function getRouteStepScrollState(containerId) {
        if (!routeStepScrollState.has(containerId)) {
          routeStepScrollState.set(containerId, {
            scrollBox: null,
            suppressUntil: 0,
            programmaticUntil: 0,
          });
        }
        return routeStepScrollState.get(containerId);
      }

      function markRouteStepAutoCenterPaused(containerId) {
        const state = getRouteStepScrollState(containerId);
        state.suppressUntil = Date.now() + ROUTE_STEP_AUTOSCROLL_PAUSE_MS;
      }

      function attachRouteStepScrollGuard(containerId) {
        const stepsContainer = document.getElementById(containerId);
        const scrollBox = stepsContainer?.closest('.route-steps-scrollbox');
        if (!scrollBox) return null;

        const state = getRouteStepScrollState(containerId);
        if (state.scrollBox === scrollBox) return scrollBox;

        state.scrollBox = scrollBox;

        const handleManualInteraction = () => {
          if (Date.now() < state.programmaticUntil) return;
          markRouteStepAutoCenterPaused(containerId);
        };

        scrollBox.addEventListener('wheel', handleManualInteraction, { passive: true });
        scrollBox.addEventListener('touchstart', handleManualInteraction, { passive: true });
        scrollBox.addEventListener('pointerdown', handleManualInteraction, { passive: true });
        scrollBox.addEventListener('scroll', () => {
          if (Date.now() < state.programmaticUntil) return;
          markRouteStepAutoCenterPaused(containerId);
        }, { passive: true });

        return scrollBox;
      }

      function syncCurrentRouteStepIntoView(containerId, shouldScroll = false) {
        if (!shouldScroll) return;
        const stepsContainer = document.getElementById(containerId);
        const scrollBox = attachRouteStepScrollGuard(containerId) || stepsContainer?.closest('.route-steps-scrollbox');
        const currentStep = stepsContainer?.querySelector('[data-current-step="true"]');
        if (!scrollBox || !currentStep) return;

        const state = getRouteStepScrollState(containerId);
        if (Date.now() < state.suppressUntil) return;

        requestAnimationFrame(() => {
          const targetTop = Math.max(0, currentStep.offsetTop - 12);
          state.programmaticUntil = Date.now() + ROUTE_STEP_PROGRAMMATIC_SCROLL_GUARD_MS;
          scrollBox.scrollTo({
            top: targetTop,
            behavior: 'smooth',
          });
        });
      }

      // 顯示路線摘要
      function showRouteSummary(preferredRouteKey = null) {
        routeOptions = buildRouteOptions(startNode.id, destinationNode.id, preferredRouteKey);
        if (!routeOptions.length) {
          showToast('目前找不到符合條件的路線');
          return;
        }
        cachedRouteResult = getSelectedRouteResult();
        syncRouteDisplayContext(startNode);
        navMode = 'nav-summary';
        switchSheetMode('sheet-nav');

        renderRouteOptions();
        renderRouteTimeline('nav-steps-container');

        ensureSheetVisible();
        updateSearchBarMode();
        
        renderMap();
        drawRoute(startNode, destinationNode);
      }

      // 階段 2: 點「開始導航」→ 畫線 + 顯示導航進行中
      function beginNavigation() {
        if (!cachedRouteResult) {
          showRouteSummary(selectedRouteKey);
        }
        isNavigating = true;
        navMode = 'nav-active';
        lastRouteFocusKey = '';
        activeRouteTransitionIndex = 0;
        switchSheetMode('sheet-nav-active');

        syncRouteDisplayContext(startNode);

        renderActiveRouteMeta();
        renderRouteTimeline('nav-active-steps-container');
        
        ensureSheetVisible();
        updateSearchBarMode();
        renderMap();
        drawRoute(startNode, destinationNode);
      }

      // 取消規劃（回到 POI 模式）
      function cancelPlan() {
        destinationNode = null;
        navMode = 'poi';
        lastRouteFocusKey = '';
        cachedRouteResult = null;
        routeOptions = [];
        clearRoutePreviewLayer();
        switchSheetMode('sheet-poi');
        ensureSheetVisible();
        updateSearchBarMode();
        renderMap();
      }

      // 結束導航
      function endNavigation() {
        isNavigating = false;
        lastRouteFocusKey = '';
        activeRouteTransitionIndex = 0;
        cachedRouteResult = null;
        routeOptions = [];
        clearRoutePreviewLayer();
        startNode = null;
        destinationNode = null;
        navMode = 'explore';
        renderMap();
        showExploreMode();
      }

      // === 搜尋列導航模式互動 ===
      function swapStartEnd() {
        if (!startNode || !destinationNode) {
          showToast('請先設定起點與終點');
          return;
        }
        [startNode, destinationNode] = [destinationNode, startNode];
        showToast('已交換起終點');
        if (navMode === 'nav-summary') showRouteSummary(selectedRouteKey);
        else if (navMode === 'nav-active') { showRouteSummary(selectedRouteKey); beginNavigation(); }
        else updateSearchBarMode();
      }

      function editNavPoint(field) {
        // 如果已在編輯另一個欄位，先復原
        if (editingNavField && editingNavField !== field) finishNavEdit();
        editingNavField = field;
        const btn = document.getElementById(`nav-bar-${field}`);
        const input = document.getElementById(`nav-input-${field}`);
        const currentNode = field === 'start' ? startNode : destinationNode;
        btn.classList.add('hidden');
        input.classList.remove('hidden');
        // 預填原本的名稱並全選，方便直接覆蓋或按 Esc 取消
        input.value = currentNode ? currentNode.name : '';
        input.focus();
        input.select();
      }

      // blur 時延遲復原（避免點搜尋結果時因 blur 先觸發導致結果消失）
      function onNavInputBlur() {
        setTimeout(() => {
          if (!editingNavField) return;
          document.getElementById('search-results').style.display = 'none';
          finishNavEdit();
          updateSearchBarMode();
        }, 200);
      }

      // 雙欄內搜尋輸入
      function onNavSearchInput(val) {
        if (!val.trim()) {
          document.getElementById('search-results').style.display = 'none';
          return;
        }
        const excludeIds = [editingNavField === 'start' ? destinationNode?.id : startNode?.id].filter(Boolean);
        renderSearchResults(searchNodes(val, { includeNonPoi: true, excludeIds }), 'navSearchSelect', '找不到結果');
      }

      // 雙欄內搜尋選取
      function navSearchSelect(nodeId) {
        const node = getNodeById(nodeId);
        document.getElementById('search-results').style.display = 'none';
        addRecentSearch(nodeId);
        if (editingNavField === 'start') {
          startNode = node;
          lastPickField = 'start';
        } else {
          destinationNode = node;
          lastPickField = 'end';
        }
        finishNavEdit();
        if (startNode && destinationNode) {
          if (startNode.id === destinationNode.id) {
            showToast('起點與終點相同，請重新選擇');
            updateSearchBarMode();
          } else {
            showRouteSummary(getDefaultRouteKey());
          }
        } else {
          updateSearchBarMode();
        }
      }

      // 結束編輯，復原 input → button
      function finishNavEdit() {
        if (!editingNavField) return;
        const btn = document.getElementById(`nav-bar-${editingNavField}`);
        const input = document.getElementById(`nav-input-${editingNavField}`);
        btn.classList.remove('hidden');
        input.classList.add('hidden');
        input.value = '';
        editingNavField = null;
      }

      function cancelNavBar() {
        finishNavEdit();
        if (isNavigating) { endNavigation(); return; }

        // nav-summary → 回到上一個 pick 模式
        if (navMode === 'nav-summary') {
          clearRoutePreviewLayer();
          cachedRouteResult = null;
          routeOptions = [];
          if (lastPickField === 'start') {
            startNode = null;
            renderPickList('start');
          } else {
            destinationNode = null;
            renderPickList('end');
          }
          renderMap();
          return;
        }

        // pick-start → 回到 destination 的 POI 詳情
        if (navMode === 'pick-start') {
          const returnNode = destinationNode;
          startNode = null;
          destinationNode = null;
          lastPickField = null;
          navMode = 'explore';
          if (returnNode) {
            selectNode(returnNode);
          } else {
            showExploreMode();
            renderMap();
          }
          return;
        }

        // pick-end → 回到 start 的 POI 詳情
        if (navMode === 'pick-end') {
          const returnNode = startNode;
          startNode = null;
          destinationNode = null;
          lastPickField = null;
          navMode = 'explore';
          if (returnNode) {
            selectNode(returnNode);
          } else {
            showExploreMode();
            renderMap();
          }
          return;
        }

        // 其他模式 → 回到探索
        startNode = null;
        destinationNode = null;
        lastPickField = null;
        showExploreMode();
        renderMap();
      }

      // === 5. 繪製地圖標記 ===
      function getBuildingLabelIcon(building) {
        const name = String(building?.name || '').toLowerCase();
        const id = String(building?.id || '').toLowerCase();
        const has = (keyword) => name.includes(keyword);

        if (has('圖書') || name.includes('library') || id.includes('lib')) return 'fa-book-open';
        if (has('行政') || has('管理') || name.includes('admin') || id.includes('mgmt')) return 'fa-landmark';
        if (has('宿舍') || has('宿') || name.includes('dorm') || id.includes('dorm')) return 'fa-bed';
        if (has('體育') || has('運動') || name.includes('sport') || id.includes('gym')) return 'fa-dumbbell';
        if (has('餐') || has('咖啡') || name.includes('caf') || id.includes('caf')) return 'fa-mug-saucer';
        if (has('藝術') || has('人文') || has('文學') || name.includes('art') || id.includes('art')) return 'fa-palette';
        if (has('教學') || has('教室') || has('學院') || name.includes('edu')) return 'fa-chalkboard';
        if (has('理工') || has('工程') || has('電機') || has('資訊') || name.includes('eng') || id.includes('eng') || id.includes('cs')) return 'fa-microchip';
        if (id === 'ab') return 'fa-building-columns';
        return 'fa-building';
      }

      const buildingLabelMetrics = {
        height: 36,
        paddingX: 10,
        gap: 8,
        iconWidth: 16,
        fontSize: 12,
        fontWeight: 700
      };

      const buildingLabelMeasureRoot = document.createElement('div');
      buildingLabelMeasureRoot.style.cssText = 'position:absolute; visibility:hidden; pointer-events:none; white-space:nowrap; top:-9999px; left:-9999px;';
      let buildingLabelMeasureReady = false;

      function escapeHtml(value) {
        return String(value || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function ensureBuildingLabelMeasureRoot() {
        if (!buildingLabelMeasureReady && document.body) {
          document.body.appendChild(buildingLabelMeasureRoot);
          buildingLabelMeasureReady = true;
        }
      }

      function measureBuildingLabelWidth(text, iconClass) {
        ensureBuildingLabelMeasureRoot();
        const safeText = escapeHtml(text);
        if (!buildingLabelMeasureReady) {
          return Math.ceil((safeText.length || 2) * buildingLabelMetrics.fontSize + (buildingLabelMetrics.paddingX * 2) + buildingLabelMetrics.gap + buildingLabelMetrics.iconWidth);
        }

        buildingLabelMeasureRoot.innerHTML = `<div class="building-label rounded-full bg-white/95 border border-border shadow-soft text-xs font-bold text-dark" style="width:auto; display:inline-flex; padding:${buildingLabelMetrics.paddingX / 2}px ${buildingLabelMetrics.paddingX}px; box-sizing:border-box;"><span class="building-label-content" style="margin-left:auto; display:inline-flex; align-items:center; gap:${buildingLabelMetrics.gap}px;"><span class="building-label-icon text-sage"><i class="fa-solid ${iconClass}"></i></span><span class="building-label-text" style="flex:0 0 auto; min-width:auto; max-width:none; overflow:visible; text-overflow:clip;">${safeText}</span></span></div>`;
        const measured = buildingLabelMeasureRoot.firstElementChild?.getBoundingClientRect().width || 0;
        return Math.ceil(measured);
      }

      function renderMap() {
        if (!hasLeaflet) return;
        markersLayer.clearLayers();
        const outdoorMode = selectedBuilding === '__outdoor__';
        const buildingOverview = !selectedBuilding;

        if (buildingOverview) {
          buildings.forEach(building => {
            const center = getBuildingCenter(building);
            const iconClass = getBuildingLabelIcon(building);
            const labelWidth = measureBuildingLabelWidth(building.name, iconClass);
            const labelHeight = buildingLabelMetrics.height;
            const icon = L.divIcon({
              className: '',
              html: `<div class="building-label rounded-full bg-white/95 border border-border shadow-soft text-xs font-bold text-dark"><span class="building-label-content"><span class="building-label-icon text-sage"><i class="fa-solid ${iconClass}"></i></span><span class="building-label-text">${building.name}</span></span></div>`,
              iconSize: [labelWidth, labelHeight],
              iconAnchor: [Math.round(labelWidth / 2), Math.round(labelHeight / 2)],
            });

            L.marker(center, { icon })
              .addTo(markersLayer)
              .on('click', (e) => { L.DomEvent.stopPropagation(e); selectBuilding(building.id); });
          });

          const outdoorNodes = getStandaloneOutdoorNodes();
          if (outdoorNodes.length) {
            outdoorNodes.forEach((node) => {
              let iconClass = typeIcons[node.type] || 'fa-location-dot';
              let extraClass = node.type === 'parking' ? 'poi' : 'poi';
              const icon = L.divIcon({
                className: `custom-marker ${extraClass}`,
                html: `<i class="fa-solid ${iconClass}"></i>`,
                iconSize: [24, 24],
                iconAnchor: [12, 12],
              });

              L.marker(node.coordinates, { icon })
                .addTo(markersLayer)
                .on('click', (e) => { L.DomEvent.stopPropagation(e); selectNode(node); });
            });
          }
          return;
        }

        // Pick mode: show all buildings' POIs for cross-building selection
        const isPickMode = navMode === 'pick-start' || navMode === 'pick-end';
        if (isPickMode) {
          // Building labels for orientation
          buildings.forEach(building => {
            const center = getBuildingCenter(building);
            const iconClass = getBuildingLabelIcon(building);
            const labelWidth = measureBuildingLabelWidth(building.name, iconClass);
            const labelHeight = buildingLabelMetrics.height;
            const icon = L.divIcon({
              className: '',
              html: `<div class="building-label rounded-full bg-white/95 border border-border shadow-soft text-xs font-bold text-dark"><span class="building-label-content"><span class="building-label-icon text-sage"><i class="fa-solid ${iconClass}"></i></span><span class="building-label-text">${building.name}</span></span></div>`,
              iconSize: [labelWidth, labelHeight],
              iconAnchor: [Math.round(labelWidth / 2), Math.round(labelHeight / 2)],
            });
            L.marker(center, { icon }).addTo(markersLayer);
          });

          // Determine default (ground) floor for each building
          const pickDefaultFloors = new Map();
          buildings.forEach(b => {
            const floors = getFloorsForBuilding(b.id);
            pickDefaultFloors.set(b.id, floors.includes(1) ? 1 : (floors.length > 0 ? floors[0] : 1));
          });

          // Show POIs from all buildings + outdoor
          nodes.forEach(node => {
            if (!node.isPOI) return;
            if (activeFilter !== 'all' && node.type !== activeFilter) return;
            if (node.isOutdoor) {
              // outdoor POIs always shown
            } else if (node.building) {
              const defFloor = pickDefaultFloors.get(node.building);
              if (defFloor !== undefined) {
                const nodeFloor = getNodeContextFloor(node, node.building);
                if (nodeFloor !== defFloor && !node.isGroundLevel) return;
              }
            } else {
              return;
            }
            let iconClass = typeof typeIcons !== 'undefined' ? (typeIcons[node.type] || "fa-location-dot") : "fa-location-dot";
            let iconHtml = `<i class="fa-solid ${iconClass}"></i>`;
            let extraClass = "poi";
            if (node.type === "elevator" || node.type === "staircase") extraClass = "elevator";
            const icon = L.divIcon({
              className: `custom-marker ${extraClass}`,
              html: iconHtml,
              iconSize: [24, 24],
              iconAnchor: [12, 12],
            });
            L.marker(node.coordinates, { icon })
              .addTo(markersLayer)
              .on("click", (e) => { L.DomEvent.stopPropagation(e); selectNode(node); });
          });

          // Start marker
          if (startNode) {
            const startIcon = L.divIcon({
              className: 'custom-marker start-marker start-pulse',
              html: '<i class="fa-solid fa-person-walking"></i>',
              iconSize: [28, 28],
              iconAnchor: [14, 14],
            });
            L.marker(startNode.coordinates, { icon: startIcon, interactive: false }).addTo(markersLayer);
          }
          // End marker
          if (destinationNode) {
            const endIcon = L.divIcon({
              className: 'custom-marker end-marker',
              html: '<i class="fa-solid fa-flag-checkered"></i>',
              iconSize: [28, 28],
              iconAnchor: [14, 14],
            });
            L.marker(destinationNode.coordinates, { icon: endIcon, interactive: false }).addTo(markersLayer);
          }
          return;
        }

        nodes
          .filter((n) => {
            if (outdoorMode) return !!n.isOutdoor;
            return isNodeInBuildingContext(n) && matchesActiveFloor(n);
          })
          .forEach((node) => {
            if (!node.isPOI) return;
            if (activeFilter !== 'all' && node.type !== activeFilter) return;

            let iconClass = typeof typeIcons !== 'undefined' ? (typeIcons[node.type] || "fa-location-dot") : "fa-location-dot";
            let iconHtml = `<i class="fa-solid ${iconClass}"></i>`;
            let extraClass = "poi";
            if (node.type === "elevator" || node.type === "staircase") {
              extraClass = "elevator";
            }
            // 非目前樓層的地面節點半透明顯示（室外模式下全部清晰）
            if (!outdoorMode && node.isGroundLevel && getNodeDisplayFloor(node) !== activeFloor) {
              extraClass += " ground-other-floor";
            }

            const icon = L.divIcon({
              className: `custom-marker ${extraClass}`,
              html: iconHtml,
              iconSize: [24, 24],
              iconAnchor: [12, 12],
            });

            L.marker(node.coordinates, { icon })
              .addTo(markersLayer)
              .on("click", (e) => { L.DomEvent.stopPropagation(e); selectNode(node); });
          });

        // 起點標記 (Sage Green + 脈衝動畫)
        if (startNode && matchesActiveFloor(startNode)) {
          const startIcon = L.divIcon({
            className: 'custom-marker start-marker start-pulse',
            html: '<i class="fa-solid fa-person-walking"></i>',
            iconSize: [28, 28],
            iconAnchor: [14, 14],
          });
          L.marker(startNode.coordinates, { icon: startIcon, interactive: false }).addTo(markersLayer);
        }

        // 終點標記 (Slate Blue 旗幟)
        if (destinationNode && matchesActiveFloor(destinationNode)) {
          const endIcon = L.divIcon({
            className: 'custom-marker end-marker',
            html: '<i class="fa-solid fa-flag-checkered"></i>',
            iconSize: [28, 28],
            iconAnchor: [14, 14],
          });
          L.marker(destinationNode.coordinates, { icon: endIcon, interactive: false }).addTo(markersLayer);
        }
      }

      // === 6. 路徑繪製（含法線投影連接線）===

      function buildRouteFloorSegments(pathNodes) {
        const segments = [];
        let currentSegment = null;

        for (let i = 0; i < pathNodes.length - 1; i++) {
          const node = pathNodes[i];
          const nextNode = pathNodes[i + 1];
          const isRampSegment = node.pathType === 'ramp' || nextNode.pathType === 'ramp';
          const segmentFloors = node.floor === nextNode.floor
            ? [node.floor]
            : isRampSegment
              ? [...new Set([node.floor, nextNode.floor].filter(Number.isFinite))].sort((a, b) => a - b)
              : [];

          if (!segmentFloors.length) {
            if (currentSegment && currentSegment.coordinates.length > 1) {
              segments.push(currentSegment);
              currentSegment = null;
            }
            continue;
          }

          const isOutdoorSegment = !!node.isOutdoor && !!nextNode.isOutdoor;
          const sameRampSegment = currentSegment
            && currentSegment.isOutdoor === isOutdoorSegment
            && currentSegment.isRamp
            && isRampSegment;
          const sameSegment = sameRampSegment || (
            currentSegment
            && currentSegment.isOutdoor === isOutdoorSegment
            && currentSegment.isRamp === isRampSegment
            && currentSegment.floors.length === segmentFloors.length
            && currentSegment.floors.every((floor, index) => floor === segmentFloors[index])
          );

          if (!sameSegment) {
            if (currentSegment && currentSegment.coordinates.length > 1) {
              segments.push(currentSegment);
            }
            currentSegment = {
              floor: segmentFloors[0],
              floors: segmentFloors,
              isOutdoor: isOutdoorSegment,
              isRamp: isRampSegment,
              coordinates: [node.coordinates],
            };
          } else if (sameRampSegment) {
            currentSegment.floors = [...new Set([...currentSegment.floors, ...segmentFloors])].sort((a, b) => a - b);
            currentSegment.floor = currentSegment.floors[0];
          }
          currentSegment.coordinates.push(nextNode.coordinates);
        }

        if (currentSegment && currentSegment.coordinates.length > 1) {
          segments.push(currentSegment);
        }

        return segments;
      }

      function buildRoutePreviewSegments(result) {
        const pathNodes = result?.path || [];
        const steps = result?.steps || [];
        const segments = [];
        let currentSegment = null;

        function flushSegment() {
          if (currentSegment && currentSegment.coordinates.length > 1) {
            segments.push(currentSegment);
          }
          currentSegment = null;
        }

        steps.forEach((stepMeta, index) => {
          const node = pathNodes[index];
          const nextNode = pathNodes[index + 1];
          if (!node || !nextNode) return;

          const descriptor = stepMeta?.descriptor || null;
          const isRampSegment = descriptor?.kind === 'ramp' || node.pathType === 'ramp' || nextNode.pathType === 'ramp';
          const isWaypointToWaypoint = node.type === 'waypoint' && nextNode.type === 'waypoint';
          const segmentFloors = Array.isArray(stepMeta?.previewFloors) && stepMeta.previewFloors.length
            ? [...new Set(stepMeta.previewFloors.filter(Number.isFinite))].sort((a, b) => a - b)
            : (node.floor === nextNode.floor
              ? [node.floor]
              : isRampSegment
                ? [...new Set([node.floor, nextNode.floor].filter(Number.isFinite))].sort((a, b) => a - b)
                : []);
          const shouldRenderAsConnector = !!stepMeta?.connector || (descriptor && descriptor.kind !== 'ramp' && !isWaypointToWaypoint);

          if (shouldRenderAsConnector) {
            flushSegment();
            segments.push({
              kind: 'connector',
              descriptor,
              coordinates: [node.coordinates, nextNode.coordinates],
              floors: segmentFloors,
              routeStepStartIndex: index,
              routeStepEndIndex: index,
            });
            return;
          }

          if (!segmentFloors.length) {
            flushSegment();
            return;
          }

          const isOutdoorSegment = typeof stepMeta?.isOutdoor === 'boolean'
            ? stepMeta.isOutdoor
            : (!!node.isOutdoor && !!nextNode.isOutdoor);
          const sameRampSegment = currentSegment
            && currentSegment.kind === 'walk'
            && currentSegment.isOutdoor === isOutdoorSegment
            && currentSegment.isRamp
            && isRampSegment;
          const sameSegment = sameRampSegment || (
            currentSegment
            && currentSegment.kind === 'walk'
            && currentSegment.isOutdoor === isOutdoorSegment
            && currentSegment.isRamp === isRampSegment
            && currentSegment.pathId === (stepMeta?.pathId || null)
            && currentSegment.floors.length === segmentFloors.length
            && currentSegment.floors.every((floor, floorIndex) => floor === segmentFloors[floorIndex])
          );

          if (!sameSegment) {
            flushSegment();
            currentSegment = {
              kind: 'walk',
              floor: segmentFloors[0],
              floors: segmentFloors,
              isOutdoor: isOutdoorSegment,
              isRamp: isRampSegment,
              pathId: stepMeta?.pathId || null,
              coordinates: [node.coordinates],
              routeStepStartIndex: index,
              routeStepEndIndex: index,
            };
          } else if (sameRampSegment) {
            currentSegment.floors = [...new Set([...currentSegment.floors, ...segmentFloors])].sort((a, b) => a - b);
            currentSegment.floor = currentSegment.floors[0];
          }

          currentSegment.routeStepEndIndex = index;
          currentSegment.coordinates.push(nextNode.coordinates);
        });

        flushSegment();
        return segments;
      }

      function getRouteTransitions(result) {
        if (!result?.path?.length || !result?.steps?.length) return [];
        const transitions = [];
        result.steps.forEach((stepMeta, index) => {
          if (!stepMeta.descriptor) return;
          transitions.push({
            descriptor: stepMeta.descriptor,
            fromNode: result.path[index],
            toNode: result.path[index + 1],
            index,
          });
        });
        return transitions;
      }

      function getSegmentMidpoint(coordinates) {
        return coordinates[Math.floor(coordinates.length / 2)] || coordinates[0];
      }

      function createRouteBadgeMarker(anchor, label, options = {}) {
        const maxWidth = options.maxWidth || 84;
        const anchorX = options.anchorX || Math.round(maxWidth / 2);
        const anchorY = options.anchorY || 14;
        return L.marker(anchor, {
          interactive: false,
          icon: L.divIcon({
            className: '',
            html: `<div class="px-2.5 py-1 rounded-full bg-white/95 border border-border shadow-soft text-[11px] font-bold text-dark inline-flex items-center justify-center overflow-hidden whitespace-nowrap leading-none" style="min-width: 38px; max-width: ${maxWidth}px; box-sizing: border-box;"><span class="block truncate leading-none">${label}</span></div>`,
            iconSize: [maxWidth, 28],
            iconAnchor: [anchorX, anchorY],
          }),
        });
      }

      function createTransitionGuideAnchor(coordinates, transitionIndex) {
        const [lat, lng] = coordinates;
        const direction = transitionIndex % 2 === 0 ? 1 : -1;
        const offsetLat = 0.000018 + (transitionIndex % 3) * 0.000004;
        const offsetLng = (0.000006 + (transitionIndex % 2) * 0.000003) / Math.max(0.2, Math.cos((lat * Math.PI) / 180));
        return [lat + direction * offsetLat, lng + offsetLng];
      }

      function createTransitionGuideLabel(transition, transitionIndex, options = {}) {
        const anchor = createTransitionGuideAnchor(transition.fromNode.coordinates, transitionIndex);
        const descriptor = transition?.descriptor;
        const label = descriptor?.kind === 'ramp'
          ? `斜坡→${getTransitionTargetLabel(descriptor, descriptor.targetFloor, transition.toNode)}`
          : `${getUserFacingNodeArea(transition.fromNode)}→${getUserFacingNodeArea(transition.toNode)}`;
        return L.marker(anchor, {
          interactive: false,
          icon: L.divIcon({
            className: '',
            html: `<div class="px-2.5 py-1 rounded-full bg-white/95 border border-border shadow-soft text-[11px] font-bold text-dark inline-flex items-center justify-center overflow-hidden whitespace-nowrap leading-none" style="min-width: 38px; max-width: 84px; box-sizing: border-box; opacity: ${options.opacity ?? 1};"><span class="block truncate leading-none">${label}</span></div>`,
            iconSize: [84, 28],
            iconAnchor: [42, 14],
          }),
        });
      }

      function isRouteSegmentInCurrentStep(segment, currentStep) {
        if (!segment || !currentStep) return false;
        const segmentStart = segment.routeStepStartIndex;
        const segmentEnd = segment.routeStepEndIndex;
        const currentStart = currentStep.routeStepStartIndex;
        const currentEnd = currentStep.routeStepEndIndex;
        if (![segmentStart, segmentEnd, currentStart, currentEnd].every(Number.isInteger)) return false;
        return segmentStart <= currentEnd && segmentEnd >= currentStart;
      }

      function getRouteStepCoordinates(step, result = getSelectedRouteResult()) {
        if (!step || !result?.path?.length) return [];
        if (step.type === 'transition') {
          return [step.fromNode?.coordinates, step.toNode?.coordinates].filter(Boolean);
        }

        const startIndex = Math.max(0, step.routeStepStartIndex ?? 0);
        const endIndex = Math.min(result.path.length - 1, (step.routeStepEndIndex ?? startIndex) + 1);
        return result.path.slice(startIndex, endIndex + 1).map((node) => node.coordinates).filter(Boolean);
      }

      function getRouteStepFocusNodes(step, result = getSelectedRouteResult()) {
        if (!step || !result?.path?.length) return [];
        const dedup = new Map();

        if (step.type === 'transition') {
          [step.fromNode, step.toNode].forEach((node) => {
            if (node?.id && node.type !== 'waypoint') dedup.set(node.id, node);
          });
          return [...dedup.values()];
        }

        const startIndex = Math.max(0, step.routeStepStartIndex ?? 0);
        const endIndex = Math.min(result.path.length - 1, (step.routeStepEndIndex ?? startIndex) + 1);
        result.path.slice(startIndex, endIndex + 1).forEach((node) => {
          if (node?.id && node.type !== 'waypoint') dedup.set(node.id, node);
        });
        return [...dedup.values()];
      }

      function createRouteFocusNodeMarker(node, isPrimary = false) {
        return L.marker(node.coordinates, {
          interactive: false,
          icon: L.divIcon({
            className: '',
            html: `<div class="inline-flex items-center gap-2 rounded-full border ${isPrimary ? 'border-sage/40 bg-white text-dark shadow-soft' : 'border-border/80 bg-white/92 text-slate shadow-sm'} px-2.5 py-1 text-[11px] font-bold"><span class="inline-block h-2.5 w-2.5 rounded-full ${isPrimary ? 'bg-sage' : 'bg-slate/60'}"></span><span class="max-w-[120px] truncate">${escapeHtml(node.name)}</span></div>`,
            iconSize: [140, 28],
            iconAnchor: [70, 14],
          }),
        });
      }

      let lastRouteFocusKey = '';

      function getRouteStepEndpoints(step, result = getSelectedRouteResult()) {
        if (!step || !result?.path?.length) return [];
        if (step.type === 'transition') {
          return [step.fromNode?.coordinates, step.toNode?.coordinates].filter(Boolean);
        }

        const startIndex = Math.max(0, step.routeStepStartIndex ?? 0);
        const endIndex = Math.min(result.path.length - 1, (step.routeStepEndIndex ?? startIndex) + 1);
        const startNode = result.path[startIndex];
        const endNode = result.path[endIndex];
        return [startNode?.coordinates, endNode?.coordinates].filter(Boolean);
      }

      function focusMapOnRouteStep(step, result = getSelectedRouteResult(), force = false) {
        if (!hasLeaflet || !step) return;
        const endpoints = getRouteStepEndpoints(step, result);
        if (!endpoints.length) return;

        const focusKey = `${selectedRouteKey}:${navMode}:${step.timelineIndex}:${activeFloor}`;
        if (!force && focusKey === lastRouteFocusKey) return;
        lastRouteFocusKey = focusKey;

        if (endpoints.length === 1) {
          map.flyTo(endpoints[0], NAVIGATION_STEP_MAX_ZOOM, { duration: 0.35 });
          return;
        }

        const bounds = L.latLngBounds(endpoints);
        if (!bounds.isValid()) return;

        map.flyToBounds(bounds, {
          paddingTopLeft: [32, 96],
          paddingBottomRight: [32, 260],
          maxZoom: NAVIGATION_STEP_MAX_ZOOM,
          duration: 0.35,
        });
      }

      function hideFloorTransitionControls() {
        currentTransitionAction = null;
        currentPrevTransitionAction = null;
        currentNextTransitionTarget = null;
        currentPrevTransitionTarget = null;
        const prevBtn = document.getElementById('floor-transition-prev-btn');
        const nextBtn = document.getElementById('floor-transition-next-btn');
        const prevLabel = document.getElementById('transition-prev-label');
        const nextLabel = document.getElementById('transition-next-label');
        if (!prevBtn || !nextBtn || !prevLabel || !nextLabel) return;
        prevBtn.disabled = true;
        nextBtn.disabled = true;
        prevLabel.innerText = '目前沒有';
        nextLabel.innerText = '目前沒有';
      }

      function updateNavActiveTopSummary(result) {
        const title = document.getElementById('nav-active-top-title');
        const kicker = document.getElementById('nav-active-top-kicker');
        if (!title || !kicker) return;

        if (navMode !== 'nav-active' || !result) {
          kicker.innerText = '導航進行中';
          title.innerText = destinationNode ? `前往 ${destinationNode.name}` : '前往目的地';
          return;
        }

        const { currentStep } = getCurrentRouteTimelineState(result);
        kicker.innerText = destinationNode ? `前往 ${destinationNode.name}` : '導航進行中';

        if (!currentStep) {
          title.innerText = '請依地圖路線前進';
          return;
        }

        if (currentStep.type === 'walk') {
          title.innerText = `${currentStep.isOutdoor ? '戶外步行' : `${formatFloorLabel(currentStep.floor)} 室內步行`} ${Math.max(1, Math.round(currentStep.distance))} 公尺`;
          return;
        }

        const descriptor = currentStep.descriptor;
        title.innerText = descriptor.kind === 'enter' || descriptor.kind === 'exit'
          ? descriptor.shortName
          : `${descriptor.actionLabel} 至 ${getTransitionTargetLabel(descriptor, descriptor.targetFloor, currentStep.toNode)}`;
      }

      function updateFloorTransitionControls(result) {
        hideFloorTransitionControls();
        updateNavActiveTopSummary(result);
        if (navMode !== 'nav-active' || !result?.path?.length) return;

        const transitions = getRouteTransitions(result);
        const transitionProgress = getClampedTransitionProgress(result);
        const nextTransitionMeta = transitionProgress < transitions.length ? transitions[transitionProgress] : null;
        const prevTransitionMeta = transitionProgress > 0 ? transitions[transitionProgress - 1] : null;

        const nextTransition = nextTransitionMeta ? {
          action: nextTransitionMeta.descriptor || describeTransitionBetweenNodes(nextTransitionMeta.fromNode, nextTransitionMeta.toNode),
          targetFloor: getActiveNodeFloorValue(nextTransitionMeta.toNode),
          targetNode: nextTransitionMeta.toNode,
        } : null;

        const prevTransition = prevTransitionMeta ? {
          action: describeTransitionBetweenNodes(prevTransitionMeta.toNode, prevTransitionMeta.fromNode) || prevTransitionMeta.descriptor,
          targetFloor: getActiveNodeFloorValue(prevTransitionMeta.fromNode),
          targetNode: prevTransitionMeta.fromNode,
        } : null;

        const prevBtn = document.getElementById('floor-transition-prev-btn');
        const nextBtn = document.getElementById('floor-transition-next-btn');
        const prevLabel = document.getElementById('transition-prev-label');
        const nextLabel = document.getElementById('transition-next-label');

        if (prevTransition) {
          currentPrevTransitionTarget = prevTransition.targetFloor;
          currentPrevTransitionAction = prevTransition.action;
          prevBtn.disabled = false;
          prevLabel.innerText = formatTransitionControlActionLabel(prevTransition, '返回');
        }

        if (nextTransition) {
          currentNextTransitionTarget = nextTransition.targetFloor;
          currentTransitionAction = nextTransition.action;
          nextBtn.disabled = false;
          nextLabel.innerText = formatTransitionControlActionLabel(nextTransition, '前往');
        }
      }

      function drawRoutePreview(result, start, end) {
        const pathNodes = result.path;
        const floorSegments = buildRoutePreviewSegments(result);
        const transitions = getRouteTransitions(result);
        const allLayers = [];
        const fitCoords = [];

        floorSegments.forEach((segment) => {
          if (segment.kind === 'connector') {
            allLayers.push(L.polyline(segment.coordinates, {
              color: '#94a3b8',
              weight: 3,
              opacity: 0.5,
              dashArray: '4, 6',
            }));
            fitCoords.push(...segment.coordinates);
            return;
          }

          const segmentFloors = segment.floors || [segment.floor];
          const isMultiFloorSegment = segmentFloors.length > 1;
          const isActiveFloor = !isMultiFloorSegment && segmentFloors.includes(activeFloor);
          const color = segment.isOutdoor
            ? (isActiveFloor ? '#10b981' : '#6ee7b7')
            : (isActiveFloor ? '#708191' : '#94a3b8');
          const polyline = L.polyline(segment.coordinates, {
            color,
            weight: isActiveFloor ? 6 : 4,
            opacity: isActiveFloor ? 0.92 : 0.55,
            dashArray: isActiveFloor ? (segment.isOutdoor ? '8, 8' : null) : (isMultiFloorSegment ? '6, 8' : '10, 8'),
          });
          allLayers.push(polyline);
          fitCoords.push(...segment.coordinates);

          if (!isActiveFloor) {
            const midPoint = getSegmentMidpoint(segment.coordinates);
            allLayers.push(createRouteBadgeMarker(midPoint, getSegmentLabel(segment), {
              maxWidth: 48,
              anchorX: 24,
              anchorY: 14,
            }));
          }
        });

        transitions.forEach((transition, index) => {
          allLayers.push(createTransitionGuideLabel(transition, index));
          fitCoords.push(createTransitionGuideAnchor(transition.fromNode.coordinates, index));
        });

        if (result.startProjection) {
          allLayers.push(L.polyline([result.startProjection.from, result.startProjection.to], {
            color: '#8FA295', weight: 3, opacity: 0.7, dashArray: '6, 8'
          }));
          fitCoords.push(result.startProjection.from, result.startProjection.to);
        }

        if (result.endProjection) {
          allLayers.push(L.polyline([result.endProjection.from, result.endProjection.to], {
            color: '#708191', weight: 3, opacity: 0.7, dashArray: '6, 8'
          }));
          fitCoords.push(result.endProjection.from, result.endProjection.to);
        }

        if (allLayers.length > 0) {
          routeLayer = L.layerGroup(allLayers).addTo(map);
          if (fitCoords.length > 0) {
            map.fitBounds(L.latLngBounds(fitCoords), { padding: [50, 50] });
          }
        }
      }

      function drawRouteActiveFloor(result, start, end) {
        const previewSegments = buildRoutePreviewSegments(result);
        const { currentStep } = getCurrentRouteTimelineState(result);
        const floorSegments = previewSegments.filter(segment => {
          const segmentFloors = segment.floors || [segment.floor];
          return segmentFloors.includes(activeFloor);
        });
        const allLayers = [];

        floorSegments.forEach(segment => {
          const isCurrentSegment = isRouteSegmentInCurrentStep(segment, currentStep);

          if (segment.kind === 'connector') {
            allLayers.push(L.polyline(segment.coordinates, {
              color: isCurrentSegment ? '#708191' : '#94a3b8',
              weight: isCurrentSegment ? 5 : 3,
              opacity: isCurrentSegment ? 0.88 : 0.22,
              dashArray: '4, 6',
            }));
            return;
          }

          const segmentFloors = segment.floors || [segment.floor];
          const isMultiFloorSegment = segmentFloors.length > 1;
          const color = segment.isOutdoor ? '#10b981' : '#708191';
          allLayers.push(L.polyline(segment.coordinates, {
            color,
            weight: isCurrentSegment ? 6 : 4,
            opacity: isCurrentSegment ? 0.95 : (isMultiFloorSegment ? 0.16 : 0.24),
            dashArray: segment.isOutdoor ? '8, 8' : (isCurrentSegment ? null : '6, 8'),
            className: isCurrentSegment ? (segment.isOutdoor ? 'route-flowing fast' : 'route-flowing') : '',
          }));

          if (!isCurrentSegment) {
            const midPoint = getSegmentMidpoint(segment.coordinates);
            allLayers.push(createRouteBadgeMarker(midPoint, getSegmentLabel(segment), {
              maxWidth: 48,
              anchorX: 24,
              anchorY: 14,
            }));
          }
        });

        getRouteTransitions(result).forEach((transition, index) => {
          const isCurrentTransition = currentStep?.type === 'transition' && currentStep.transitionIndex === index;
          allLayers.push(createTransitionGuideLabel(transition, index, { opacity: isCurrentTransition ? 1 : 0.42 }));
        });

        if (result.startProjection && start.floor === activeFloor) {
          allLayers.push(L.polyline(
            [result.startProjection.from, result.startProjection.to],
            {
              color: '#8FA295',
              weight: currentStep?.routeStepStartIndex === 0 ? 4 : 3,
              opacity: currentStep?.routeStepStartIndex === 0 ? 0.82 : 0.24,
              dashArray: '6, 8'
            }
          ));
        }

        if (result.endProjection && end.floor === activeFloor) {
          allLayers.push(L.polyline(
            [result.endProjection.from, result.endProjection.to],
            {
              color: '#708191',
              weight: currentStep?.routeStepEndIndex === result.steps.length - 1 ? 4 : 3,
              opacity: currentStep?.routeStepEndIndex === result.steps.length - 1 ? 0.82 : 0.24,
              dashArray: '6, 8'
            }
          ));
        }

        const focusNodes = getRouteStepFocusNodes(currentStep, result);
        focusNodes.forEach((node, index) => {
          allLayers.push(createRouteFocusNodeMarker(node, index === 0));
        });

        if (allLayers.length > 0) {
          routeLayer = L.layerGroup(allLayers).addTo(map);
          focusMapOnRouteStep(currentStep, result, true);
        }

        updateFloorTransitionControls(result);
      }

      function drawRoute(start, end) {
        if (!hasLeaflet) return;
        clearRoutePreviewLayer();

        // 使用快取結果或重新計算
        const result = getSelectedRouteResult() || findShortestPath(start.id, end.id);
        if (!result) return;
        const pathNodes = result.path;
        if (!pathNodes || pathNodes.length < 2) return;

        if (navMode === 'nav-summary') {
          drawRoutePreview(result, start, end);
          return;
        }

        drawRouteActiveFloor(result, start, end);
      }

      // === 7. 導航模式跨樓層操作 ===
      function executeFloorTransition(direction = 'next') {
        const targetFloor = direction === 'prev' ? currentPrevTransitionTarget : currentNextTransitionTarget;
        if (targetFloor !== null && targetFloor !== undefined) {
          const result = getSelectedRouteResult();
          const transitionCount = getRouteTransitions(result).length;
          if (direction === 'prev') {
            activeRouteTransitionIndex = Math.max(0, activeRouteTransitionIndex - 1);
          } else {
            activeRouteTransitionIndex = Math.min(transitionCount, activeRouteTransitionIndex + 1);
          }
          activeFloor = targetFloor;
          updateFloorButtonLabel();
          renderRouteTimeline('nav-active-steps-container');
          renderMap();
          drawRoute(startNode, destinationNode);
        }
      }

      // Initial Render
      fetch('map_data.json')
        .then(r => {
          if (!r.ok) throw new Error(`HTTP ${r.status}`);
          return r.json();
        })
        .then(data => {
          buildings = data.buildings || [];

          const rawNodes = data.nodes || [];
          rawPaths = data.paths || [];

          nodes = [];
          const newEdges = [];
          const expandedIds = {};
          const rampFloorBounds = new Map();

          function buildIndoorKey(entity) {
            return entity?.building && Number.isInteger(entity?.buildingFloor) && !entity?.isOutdoor
              ? `indoor:${entity.building}:${entity.buildingFloor}`
              : null;
          }

          function buildOutdoorKey(entity) {
            return Number.isFinite(entity?.realFloor)
              ? `outdoor:${Math.round(entity.realFloor * 100) / 100}`
              : null;
          }

          function getProjectionKeysForNode(node) {
            const keys = new Set();
            const indoorKey = buildIndoorKey(node);
            const outdoorKey = buildOutdoorKey(node);
            if (indoorKey) keys.add(indoorKey);
            if (node.isOutdoor || (node.type === 'entrance' && node.isGroundLevel)) {
              if (outdoorKey) keys.add(outdoorKey);
            }
            return [...keys];
          }

          function getEdgeProjectionKey(sourceNode, targetNode, edge) {
            const indoorKey = buildIndoorKey(sourceNode);
            if (indoorKey && indoorKey === buildIndoorKey(targetNode)) return indoorKey;
            const outdoorKey = buildOutdoorKey(sourceNode);
            if (outdoorKey && outdoorKey === buildOutdoorKey(targetNode) && sourceNode.isOutdoor && targetNode.isOutdoor) return outdoorKey;
            return null;
          }

          function canProjectNodeToRamp(node, sourceNode, targetNode, edge, projection = null) {
            if (edge?.pathType !== 'ramp') return false;

            const nodeRealFloor = Number(node?.realFloor ?? node?.floor);
            const rampPathId = String(sourceNode?.id || '').replace(/_v\d+_L[^_]+$/, '').replace(/_v\d+$/, '');
            const floorBounds = rampFloorBounds.get(rampPathId);
            if (!Number.isFinite(nodeRealFloor) || !floorBounds) return false;

            const minRealFloor = floorBounds.minRealFloor - 0.01;
            const maxRealFloor = floorBounds.maxRealFloor + 0.01;
            if (nodeRealFloor < minRealFloor || nodeRealFloor > maxRealFloor) return false;

            if (node?.isOutdoor) return true;
            return node?.type === 'entrance' && !!node?.isGroundLevel;
          }

          function getGraphNodePathId(nodeId) {
            return nodeId.replace(/_v\d+_L[^_]+$/, '').replace(/_v\d+$/, '');
          }

          function createGraphNode(base, id, { buildingFloor = null, realFloor = null, displayFloor = null, isOutdoor = null, pathType = null } = {}) {
            const nextRealFloor = Number.isFinite(realFloor) ? realFloor : null;
            const nextBuildingFloor = Number.isInteger(buildingFloor) ? buildingFloor : null;
            const nextDisplayFloor = displayFloor ?? nextBuildingFloor ?? (Number.isFinite(nextRealFloor) ? Math.round(nextRealFloor) : 1);
            return {
              ...base,
              id,
              originalId: base.originalId || base.id,
              floor: nextDisplayFloor,
              displayFloor: nextDisplayFloor,
              buildingFloor: nextBuildingFloor,
              realFloor: nextRealFloor,
              isOutdoor: isOutdoor ?? !!base.isOutdoor,
              pathType: pathType || base.pathType || null,
            };
          }

          function getBuildingFloors(buildingId) {
            const floorSet = new Set();
            rawNodes.forEach(node => {
              if (node.building === buildingId) {
                getRawNodeBuildingFloors(node).forEach(floor => floorSet.add(floor));
              }
            });
            rawPaths.forEach(path => {
              if (path.building === buildingId) {
                getRawPathBuildingFloors(path).forEach(floor => floorSet.add(floor));
              }
            });
            return [...floorSet].sort((a, b) => a - b);
          }

          rawNodes.forEach(rawNode => {
            const buildingFloors = getRawNodeBuildingFloors(rawNode);
            const realFloors = getRawNodeRealFloors(rawNode);
            const useBuildingFloors = buildingFloors.length > 0 && !rawNode.isOutdoor;
            const levels = useBuildingFloors ? buildingFloors : realFloors;
            expandedIds[rawNode.id] = {};

            levels.forEach((levelValue, index) => {
              const buildingFloor = useBuildingFloors ? levelValue : null;
              const realFloor = useBuildingFloors
                ? mapBuildingFloorToRealFloor(rawNode.building, levelValue)
                : (Number.isFinite(realFloors[index]) ? realFloors[index] : levelValue);
              const displayFloor = useBuildingFloors ? buildingFloor : Math.round(realFloor);
              const expandedId = levels.length > 1 ? `${rawNode.id}_L${displayFloor}` : rawNode.id;
              nodes.push(createGraphNode(rawNode, expandedId, {
                buildingFloor,
                realFloor,
                displayFloor,
                isOutdoor: !!rawNode.isOutdoor,
              }));
              expandedIds[rawNode.id][displayFloor] = expandedId;
            });

            if ((rawNode.type === 'elevator' || rawNode.type === 'staircase') && levels.length > 1) {
              const expandedNodes = levels.map((levelValue, index) => ({
                id: expandedIds[rawNode.id][useBuildingFloors ? levelValue : Math.round(realFloors[index] ?? levelValue)],
                buildingFloor: useBuildingFloors ? levelValue : null,
                realFloor: useBuildingFloors
                  ? mapBuildingFloorToRealFloor(rawNode.building, levelValue)
                  : (Number.isFinite(realFloors[index]) ? realFloors[index] : levelValue),
              })).sort((a, b) => a.realFloor - b.realFloor);

              for (let index = 0; index < expandedNodes.length - 1; index += 1) {
                const fromNode = expandedNodes[index];
                const toNode = expandedNodes[index + 1];
                newEdges.push({
                  source: fromNode.id,
                  target: toNode.id,
                  isVertical: true,
                  verticalPenalty: 118 * Math.max(1, Math.abs((toNode.realFloor ?? 0) - (fromNode.realFloor ?? 0))),
                });
              }
            }
          });

          rawPaths.forEach(path => {
            const pathType = path.pathType || 'walk';
            if (pathType === 'ramp') {
              const rampFloors = getRawPathRealFloors(path);
              if (rampFloors.length) {
                rampFloorBounds.set(path.id, {
                  minRealFloor: Math.min(...rampFloors),
                  maxRealFloor: Math.max(...rampFloors),
                });
              }

              const startRealFloor = rampFloors[0] ?? 1;
              const endRealFloor = rampFloors[rampFloors.length - 1] ?? startRealFloor;
              path.points.forEach((point, index) => {
                const ratio = path.points.length <= 1 ? 0 : index / (path.points.length - 1);
                const realFloor = Math.round((startRealFloor + (endRealFloor - startRealFloor) * ratio) * 100) / 100;
                nodes.push(createGraphNode({
                  id: `${path.id}_v${index}`,
                  name: '斜坡路徑點',
                  type: 'waypoint',
                  coordinates: [...point],
                  isPOI: false,
                  isOutdoor: true,
                  pathType,
                }, `${path.id}_v${index}`, {
                  realFloor,
                  displayFloor: Math.round(realFloor),
                  isOutdoor: true,
                  pathType,
                }));
              });

              (path.segments || []).forEach(segment => {
                newEdges.push({
                  source: `${path.id}_v${segment[0]}`,
                  target: `${path.id}_v${segment[1]}`,
                  isVertical: false,
                  pathId: path.id,
                  previewFloors: null,
                  pathType,
                });
              });
              return;
            }

            const buildingFloors = getRawPathBuildingFloors(path);
            const defaultBuildingFloors = path.building ? getBuildingFloors(path.building) : [];
            const realFloors = getRawPathRealFloors(path);
            const useBuildingFloors = buildingFloors.length > 0 && !path.isOutdoor;
            const levels = useBuildingFloors
              ? (buildingFloors.length ? buildingFloors : defaultBuildingFloors)
              : (realFloors.length ? realFloors : [1]);

            levels.forEach((levelValue, index) => {
              const buildingFloor = useBuildingFloors ? levelValue : null;
              const realFloor = useBuildingFloors
                ? mapBuildingFloorToRealFloor(path.building, levelValue)
