                : (Number.isFinite(realFloors[index]) ? realFloors[index] : levelValue);
              const displayFloor = useBuildingFloors ? buildingFloor : Math.round(realFloor);

              path.points.forEach((point, pointIndex) => {
                nodes.push(createGraphNode({
                  id: `${path.id}_v${pointIndex}_L${displayFloor}`,
                  name: '路徑點',
                  type: 'waypoint',
                  coordinates: [...point],
                  isPOI: false,
                  building: path.building || undefined,
                  isOutdoor: !!path.isOutdoor,
                }, `${path.id}_v${pointIndex}_L${displayFloor}`, {
                  buildingFloor,
                  realFloor,
                  displayFloor,
                  isOutdoor: !!path.isOutdoor,
                }));
              });

              (path.segments || []).forEach(segment => {
                newEdges.push({
                  source: `${path.id}_v${segment[0]}_L${displayFloor}`,
                  target: `${path.id}_v${segment[1]}_L${displayFloor}`,
                  isVertical: false,
                  pathId: path.id,
                  previewFloors: [displayFloor],
                  pathType,
                });
              });
            });
          });

          const PATH_CONNECT_THRESHOLD = 20;
          const additions = [];
          const floorEdges = newEdges
            .map((edge, index) => ({ ...edge, _idx: index }))
            .filter(edge => !edge.isVertical);

          nodes.forEach(node => {
            const nodePathId = getGraphNodePathId(node.id);
            const nodeProjectionKeys = getProjectionKeysForNode(node);
            if (!nodeProjectionKeys.length) return;

            const bestByKey = new Map();

            floorEdges.forEach(edge => {
              const sourceNode = nodes.find(candidate => candidate.id === edge.source);
              const targetNode = nodes.find(candidate => candidate.id === edge.target);
              if (!sourceNode || !targetNode) return;

              const projection = pointToSegmentProjection(
                node.coordinates[0], node.coordinates[1],
                sourceNode.coordinates[0], sourceNode.coordinates[1],
                targetNode.coordinates[0], targetNode.coordinates[1]
              );
              const matchesRamp = canProjectNodeToRamp(node, sourceNode, targetNode, edge, projection);
              const edgeKey = getEdgeProjectionKey(sourceNode, targetNode, edge);
              if (!matchesRamp && (!edgeKey || !nodeProjectionKeys.includes(edgeKey))) return;

              const sourcePathId = getGraphNodePathId(sourceNode.id);
              const targetPathId = getGraphNodePathId(targetNode.id);
              if (sourcePathId === nodePathId && targetPathId === nodePathId) return;

              const distance = haversineDistance(node.coordinates[0], node.coordinates[1], projection.x, projection.y);
              const existing = bestByKey.get(edgeKey);
              if (!existing || distance < existing.distance) {
                bestByKey.set(edgeKey, { distance, projection, sourceNode, targetNode, edge });
              }
            });

            bestByKey.forEach(best => {
              if (best.distance > PATH_CONNECT_THRESHOLD) return;
              const alreadyConnected = newEdges.some(edge =>
                (edge.source === node.id && (edge.target === best.edge.source || edge.target === best.edge.target)) ||
                (edge.target === node.id && (edge.source === best.edge.source || edge.source === best.edge.target))
              );
              if (alreadyConnected) return;

              additions.push({
                nodeId: node.id,
                graphNode: node,
                projection: best.projection,
                sourceNode: best.sourceNode,
                targetNode: best.targetNode,
                edgeSource: best.edge.source,
                edgeTarget: best.edge.target,
                edgeOrigIdx: best.edge._idx,
              });
            });
          });

          const groupedByEdge = {};
          additions.forEach(addition => {
            if (!groupedByEdge[addition.edgeOrigIdx]) groupedByEdge[addition.edgeOrigIdx] = [];
            groupedByEdge[addition.edgeOrigIdx].push(addition);
          });

          Object.values(groupedByEdge).forEach(group => {
            group.sort((left, right) => left.projection.t - right.projection.t);
            const { edgeSource, edgeTarget, sourceNode, targetNode, edge } = group[0];
            const originalIndex = newEdges.findIndex(edge => edge.source === edgeSource && edge.target === edgeTarget && !edge.isVertical);
            if (originalIndex >= 0) newEdges.splice(originalIndex, 1);
            const edgeRenderMeta = copyEdgeRenderMeta(edge);

            const projectionNodes = [];
            group.forEach(addition => {
              const { nodeId, graphNode, projection } = addition;
              const distToSource = haversineDistance(projection.x, projection.y, sourceNode.coordinates[0], sourceNode.coordinates[1]);
              const distToTarget = haversineDistance(projection.x, projection.y, targetNode.coordinates[0], targetNode.coordinates[1]);

              if (distToSource < 0.1) {
                newEdges.push({ source: nodeId, target: edgeSource, isVertical: false, ...copyEdgeRenderMeta(edgeRenderMeta, { connector: true }) });
                return;
              }
              if (distToTarget < 0.1) {
                newEdges.push({ source: nodeId, target: edgeTarget, isVertical: false, ...copyEdgeRenderMeta(edgeRenderMeta, { connector: true }) });
                return;
              }

              let reusedProjectionNodeId = null;
              projectionNodes.forEach(item => {
                const existingNode = nodes.find(candidate => candidate.id === item.projectionNodeId);
                if (!existingNode) return;
                const distance = haversineDistance(projection.x, projection.y, existingNode.coordinates[0], existingNode.coordinates[1]);
                if (distance < 0.1) reusedProjectionNodeId = item.projectionNodeId;
              });

              if (reusedProjectionNodeId) {
                newEdges.push({ source: nodeId, target: reusedProjectionNodeId, isVertical: false, ...copyEdgeRenderMeta(edgeRenderMeta, { connector: true }) });
                return;
              }

              const projectionNodeId = `__pvp_${nodeId}`;
              nodes.push(createGraphNode({
                id: projectionNodeId,
                name: '路徑投影點',
                type: 'waypoint',
                coordinates: [parseFloat(projection.x.toFixed(6)), parseFloat(projection.y.toFixed(6))],
                isPOI: false,
                building: sourceNode.building,
                isOutdoor: sourceNode.isOutdoor,
              }, projectionNodeId, {
                buildingFloor: sourceNode.buildingFloor ?? graphNode.buildingFloor,
                realFloor: sourceNode.realFloor ?? graphNode.realFloor,
                displayFloor: sourceNode.displayFloor ?? graphNode.displayFloor,
                isOutdoor: sourceNode.isOutdoor,
              }));
              projectionNodes.push({ projectionNodeId, nodeId });
              newEdges.push({ source: nodeId, target: projectionNodeId, isVertical: false, ...copyEdgeRenderMeta(edgeRenderMeta, { connector: true }) });
            });

            let previousNodeId = edgeSource;
            projectionNodes.forEach(item => {
              newEdges.push({ source: previousNodeId, target: item.projectionNodeId, isVertical: false, ...copyEdgeRenderMeta(edgeRenderMeta) });
              previousNodeId = item.projectionNodeId;
            });
            newEdges.push({ source: previousNodeId, target: edgeTarget, isVertical: false, ...copyEdgeRenderMeta(edgeRenderMeta) });
          });

          edges = newEdges;
          loadPreferences();
          updateSettingUI();
          selectedNode = null;
          updateFloorControlUI();
          renderMap();
          showExploreMode();
          renderDrawerFavorites();
          requestCurrentLocation({ silent: true, updateSelection: true });
        })
        .catch(error => {
          console.error('Failed to initialize campus map:', error);
          setStatusBanner('地圖資料載入失敗，無法完成初始化。請確認 map_data.json 可讀取且格式正確。', 'error');
          showToast('地圖資料載入失敗');
          buildings = [];
          nodes = [];
          edges = [];
          rawPaths = [];
          selectedNode = null;
          startNode = null;
          destinationNode = null;
          cachedRouteResult = null;
          routeOptions = [];
          updateFloorControlUI();
          renderDrawerFavorites();
          showExploreMode();
        });

      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js').catch(err => {
            console.warn('Service worker registration failed:', err);
          });
        });
      }
    </script>
  </body>
</html>
